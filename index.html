<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMA Platform — GWealth</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #8A6B28;
    --dark: #0A0C0F;
    --dark-2: #111318;
    --dark-3: #181C23;
    --dark-4: #1E2330;
    --border: rgba(201,168,76,0.15);
    --border-strong: rgba(201,168,76,0.35);
    --text: #F0EDE6;
    --text-muted: #7A7D85;
    --text-dim: #4A4D55;
    --success: #2ECC8A;
    --warning: #E8A030;
    --danger: #E85050;
    --blue: #4A8FE8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--dark-2); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  /* LOGIN SCREEN */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dark);
    position: relative;
    overflow: hidden;
  }
  .login-bg {
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 50%);
  }
  .login-grid {
    position: absolute; inset: 0;
    background-image: 
      linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .login-card {
    position: relative;
    width: 420px;
    padding: 56px 48px;
    background: var(--dark-2);
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    text-align: center;
  }
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .login-logo-wrap {
    width: 72px; height: 72px;
    margin: 0 auto 28px;
    border: 1px solid var(--border-strong);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--dark-3);
    position: relative;
  }
  .login-logo-wrap::after {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 1px solid var(--border);
  }
  .login-logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
  }
  .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 300;
    color: var(--text);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .login-subtitle {
    font-size: 12px; color: var(--text-muted);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 40px;
  }
  .login-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-strong), transparent);
    margin-bottom: 36px;
  }
  .login-btn {
    width: 100%;
    padding: 14px 24px;
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    border-radius: 1px;
    position: relative; overflow: hidden;
  }
  .login-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.1), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .login-btn:hover::before { opacity: 1; }
  .login-btn:hover { border-color: var(--gold); color: var(--gold); }
  .login-note { font-size: 11px; color: var(--text-dim); margin-top: 20px; }

  /* APP SHELL */
  .app { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 240px; min-width: 240px;
    background: var(--dark-2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 100;
  }
  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .sidebar-logo-icon {
    width: 36px; height: 36px;
    border: 1px solid var(--border-strong);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--dark-3);
    flex-shrink: 0;
  }
  .sidebar-logo-icon span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .sidebar-logo-text { line-height: 1.2; }
  .sidebar-logo-text .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 600;
    color: var(--text); letter-spacing: 0.5px;
  }
  .sidebar-logo-text .sub {
    font-size: 9px; color: var(--text-muted);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .sidebar-nav { padding: 16px 12px; flex: 1; overflow-y: auto; }
  .nav-section-label {
    font-size: 9px; color: var(--text-dim);
    letter-spacing: 2.5px; text-transform: uppercase;
    padding: 8px 12px 6px;
    margin-top: 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-muted);
    font-size: 13px; font-weight: 400;
    margin-bottom: 1px;
    border: 1px solid transparent;
  }
  .nav-item:hover { color: var(--text); background: rgba(201,168,76,0.05); }
  .nav-item.active {
    color: var(--gold-light);
    background: rgba(201,168,76,0.08);
    border-color: var(--border);
  }
  .nav-item .nav-icon { font-size: 15px; width: 18px; text-align: center; }
  .nav-badge {
    margin-left: auto;
    background: var(--gold-dim);
    color: var(--dark);
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 10px;
    min-width: 18px; text-align: center;
  }
  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid var(--border);
  }
  .user-card {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: var(--dark-3);
  }
  .user-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--dark);
    flex-shrink: 0;
  }
  .user-info .uname { font-size: 12px; font-weight: 500; color: var(--text); }
  .user-info .uemail { font-size: 10px; color: var(--text-muted); }
  .logout-btn {
    margin-top: 8px; width: 100%;
    padding: 7px; background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted); font-size: 11px;
    cursor: pointer; border-radius: 2px;
    letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.2s;
  }
  .logout-btn:hover { color: var(--danger); border-color: var(--danger); }

  /* MAIN */
  .main { margin-left: 240px; flex: 1; min-height: 100vh; }
  .topbar {
    height: 56px; padding: 0 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--dark-2);
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 400; color: var(--text);
    letter-spacing: 0.5px;
  }
  .topbar-actions { display: flex; align-items: center; gap: 12px; }
  .topbar-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 1px;
    font-size: 11px; color: var(--text-muted);
    background: var(--dark-3);
  }
  .topbar-badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success); animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .page { padding: 32px; }

  /* KPI CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .kpi-card {
    background: var(--dark-2);
    border: 1px solid var(--border);
    border-radius: 2px; padding: 24px;
    position: relative; overflow: hidden;
    transition: border-color 0.2s;
  }
  .kpi-card:hover { border-color: var(--border-strong); }
  .kpi-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .kpi-card:hover::after { opacity: 1; }
  .kpi-label { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
  .kpi-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 300; color: var(--text);
    line-height: 1; margin-bottom: 8px;
  }
  .kpi-value .unit { font-size: 18px; color: var(--gold); margin-right: 4px; }
  .kpi-change { font-size: 11px; display: flex; align-items: center; gap: 4px; }
  .kpi-change.up { color: var(--success); }
  .kpi-change.neutral { color: var(--text-muted); }
  .kpi-icon {
    position: absolute; right: 20px; top: 20px;
    font-size: 28px; opacity: 0.12;
  }

  /* SECTION HEADER */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 400; color: var(--text);
  }
  .section-title span { color: var(--gold); }

  /* BUTTONS */
  .btn {
    padding: 9px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; border-radius: 1px;
    transition: all 0.2s; border: 1px solid;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary {
    background: transparent;
    border-color: var(--gold-dim);
    color: var(--gold-light);
  }
  .btn-primary:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }
  .btn-ghost {
    background: transparent;
    border-color: var(--border);
    color: var(--text-muted);
  }
  .btn-ghost:hover { border-color: var(--border-strong); color: var(--text); }
  .btn-danger {
    background: transparent;
    border-color: rgba(232,80,80,0.3);
    color: var(--danger);
  }
  .btn-sm { padding: 6px 14px; font-size: 10px; }

  /* TABLE */
  .table-wrap {
    background: var(--dark-2);
    border: 1px solid var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .table-toolbar {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .search-input {
    flex: 1; max-width: 320px;
    padding: 8px 14px;
    background: var(--dark-3);
    border: 1px solid var(--border);
    border-radius: 1px;
    color: var(--text); font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--gold-dim); }
  .search-input::placeholder { color: var(--text-dim); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th {
    padding: 12px 20px;
    text-align: left;
    font-size: 10px; font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 2px; text-transform: uppercase;
    background: var(--dark-3);
  }
  td {
    padding: 14px 20px;
    font-size: 13px; color: var(--text);
    border-bottom: 1px solid rgba(201,168,76,0.05);
  }
  tr:hover td { background: rgba(201,168,76,0.03); }
  tr:last-child td { border-bottom: none; }

  /* BADGES */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 1px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    border: 1px solid;
  }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; }
  .badge-gold { background: rgba(201,168,76,0.1); border-color: rgba(201,168,76,0.3); color: var(--gold-light); }
  .badge-gold .badge-dot { background: var(--gold); }
  .badge-green { background: rgba(46,204,138,0.1); border-color: rgba(46,204,138,0.3); color: var(--success); }
  .badge-green .badge-dot { background: var(--success); }
  .badge-blue { background: rgba(74,143,232,0.1); border-color: rgba(74,143,232,0.3); color: var(--blue); }
  .badge-blue .badge-dot { background: var(--blue); }
  .badge-orange { background: rgba(232,160,48,0.1); border-color: rgba(232,160,48,0.3); color: var(--warning); }
  .badge-orange .badge-dot { background: var(--warning); }
  .badge-red { background: rgba(232,80,80,0.1); border-color: rgba(232,80,80,0.3); color: var(--danger); }
  .badge-red .badge-dot { background: var(--danger); }
  .badge-gray { background: rgba(122,125,133,0.1); border-color: rgba(122,125,133,0.3); color: var(--text-muted); }
  .badge-gray .badge-dot { background: var(--text-muted); }

  /* LOADING */
  .loading-wrap { padding: 60px 20px; text-align: center; }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

  /* ERROR */
  .error-wrap {
    padding: 20px; margin: 16px 0;
    background: rgba(232,80,80,0.08);
    border: 1px solid rgba(232,80,80,0.2);
    border-radius: 2px;
    font-size: 13px; color: var(--danger);
    display: flex; align-items: center; gap: 10px;
  }

  /* EMPTY STATE */
  .empty-state { padding: 60px 20px; text-align: center; }
  .empty-icon { font-size: 40px; opacity: 0.2; margin-bottom: 16px; }
  .empty-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--text-muted); margin-bottom: 6px; }
  .empty-sub { font-size: 12px; color: var(--text-dim); }

  /* GRID CARDS */
  .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .asset-card {
    background: var(--dark-2);
    border: 1px solid var(--border);
    border-radius: 2px; padding: 24px;
    cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .asset-card:hover { border-color: var(--border-strong); transform: translateY(-2px); }
  .asset-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--gold-dim), transparent);
  }
  .asset-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .asset-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .asset-location { font-size: 11px; color: var(--text-muted); }
  .asset-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .asset-metric-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 3px; }
  .asset-metric-value { font-size: 14px; font-weight: 500; color: var(--text); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10,12,15,0.85);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--dark-2);
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    width: 100%; max-width: 640px;
    max-height: 85vh; overflow-y: auto;
    position: relative;
  }
  .modal::before {
    content: '';
    position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .modal-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--text); }
  .modal-close {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); width: 30px; height: 30px;
    border-radius: 1px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { border-color: var(--danger); color: var(--danger); }
  .modal-body { padding: 24px 28px; }
  .modal-footer { padding: 16px 28px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; }
  .form-input, .form-select, .form-textarea {
    padding: 10px 14px;
    background: var(--dark-3);
    border: 1px solid var(--border);
    border-radius: 1px;
    color: var(--text); font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none; transition: border-color 0.2s;
    width: 100%;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold-dim); }
  .form-select option { background: var(--dark-3); }
  .form-textarea { resize: vertical; min-height: 80px; }

  /* DETAIL PANEL */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .detail-item { }
  .detail-label { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .detail-value { font-size: 13px; color: var(--text); }
  .detail-section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; color: var(--gold);
    margin: 20px 0 14px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* HITOS */
  .hito-item {
    display: flex; gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .hito-item:last-child { border-bottom: none; }
  .hito-indicator {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 4px; flex-shrink: 0;
  }
  .hito-info { flex: 1; }
  .hito-title { font-size: 13px; color: var(--text); margin-bottom: 3px; }
  .hito-meta { font-size: 11px; color: var(--text-muted); }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .tab {
    padding: 10px 20px;
    font-size: 12px; font-weight: 500;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted);
    cursor: pointer; transition: all 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }

  /* APPROVAL FLOW */
  .approval-step {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    border: 1px solid var(--border);
    border-radius: 2px; margin-bottom: 8px;
    background: var(--dark-3);
  }
  .approval-step-num {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--gold);
    flex-shrink: 0;
  }

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ============================================================
// CONFIG — Reemplaza con tus valores reales
// ============================================================
const CONFIG = {
  clientId: "93b3b0ca-0a85-46ee-baab-83e5057fe6ef",
  tenantId: "3ba3bb69-adc5-4b25-8b0b-ae30ae6add15",
  redirectUri: window.location.href.split('?')[0].split('#')[0],
  scopes: ["https://graph.microsoft.com/Sites.ReadWrite.All", "https://graph.microsoft.com/Files.ReadWrite.All"],
  // Actualiza con el ID real de tu sitio SharePoint
  // Para obtenerlo: GET https://graph.microsoft.com/v1.0/sites?search=gwealth
  siteInversionistas: "gwealthm.sharepoint.com,61a299d4-459e-49de-abf0-543254b6f15d,39b5bba6-e439-45f0-9bdc-74373c693c3f",
  siteProyectos: "gwealthm.sharepoint.com,4c74ecde-84a7-414d-abe8-e6deb0bd03d9,39b5bba6-e439-45f0-9bdc-74373c693c3f",
};

// MSAL Instance
const msalInstance = new msal.PublicClientApplication({
  auth: {
    clientId: CONFIG.clientId,
    authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: CONFIG.redirectUri,
  },
  cache: { cacheLocation: "sessionStorage" },
});

// ============================================================
// GRAPH API HELPER
// ============================================================
async function callGraph(endpoint) {
  try {
    const accounts = msalInstance.getAllAccounts();
    if (!accounts.length) throw new Error("No hay sesión activa");
    const tokenRes = await msalInstance.acquireTokenSilent({
      scopes: CONFIG.scopes,
      account: accounts[0],
    });
    const res = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, {
      headers: { Authorization: `Bearer ${tokenRes.accessToken}` },
    });
    if (!res.ok) throw new Error(`Graph API error: ${res.status}`);
    return await res.json();
  } catch (e) {
    // Intentar login interactivo si el token expiró
    if (e.name === "InteractionRequiredAuthError") {
      await msalInstance.acquireTokenPopup({ scopes: CONFIG.scopes });
    }
    throw e;
  }
}

async function postGraph(endpoint, body) {
  const accounts = msalInstance.getAllAccounts();
  const tokenRes = await msalInstance.acquireTokenSilent({
    scopes: CONFIG.scopes,
    account: accounts[0],
  });
  const res = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, {
    method: "POST",
    headers: {
      Authorization: `Bearer ${tokenRes.accessToken}`,
      "Content-Type": "application/json",
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`Error: ${res.status}`);
  return await res.json();
}

// ============================================================
// USER RESOLUTION - Cache de usuarios del sitio
// ============================================================
const userCache = {};

async function resolveUser(siteId, lookupId) {
  if (!lookupId) return null;
  const key = `${siteId}_${lookupId}`;
  if (userCache[key]) return userCache[key];
  try {
    const res = await callGraph(`/sites/${siteId}/lists/User Information List/items/${lookupId}?$expand=fields`);
    const name = res.fields?.Title || res.fields?.Name || null;
    if (name) userCache[key] = name;
    return name;
  } catch(e) {
    return null;
  }
}

async function resolveUsers(siteId, items, lookupFields) {
  // Recolecta todos los LookupIds únicos
  const ids = new Set();
  items.forEach(item => {
    lookupFields.forEach(f => {
      if (item.fields[f]) ids.add(String(item.fields[f]));
    });
  });
  // Resuelve en paralelo
  await Promise.all([...ids].map(id => resolveUser(siteId, id)));
  return userCache;
}


function getEtapaBadge(etapa) {

    "Etapa 2: Negociación": { cls: "badge-orange", label: "Negociación" },

    "Etapa 4: Funding": { cls: "badge-blue", label: "Funding" },
    "Etapa 5: Cierre": { cls: "badge-gold", label: "Cierre" },
    "Etapa 6: Post Closing": { cls: "badge-green", label: "Post Closing" },
    // KYC
    "Enviado a Aprobación": { cls: "badge-blue", label: "En Revisión" },
    "Aprobado": { cls: "badge-green", label: "Aprobado" },
    "Pendiente": { cls: "badge-orange", label: "Pendiente" },
    "Pendiente de Generación": { cls: "badge-orange", label: "Pendiente" },
    "En Revisión": { cls: "badge-blue", label: "En Revisión" },
    "Rechazado": { cls: "badge-red", label: "Rechazado" },
    // Estados
    "Activo": { cls: "badge-green", label: "Activo" },
    "En Evaluación": { cls: "badge-orange", label: "En Evaluación" },
    "En proceso": { cls: "badge-blue", label: "En proceso" },
  };
  const b = map[etapa] || { cls: "badge-gray", label: etapa || "—" };
  return <span className={`badge ${b.cls}`}><span className="badge-dot"></span>{b.label}</span>;
}

function fmtMoney(val) {
  if (!val) return "—";
  const n = parseFloat(val);
  if (isNaN(n)) return val;
  if (n >= 1000000) return `$${(n/1000000).toFixed(1)}M`;
  if (n >= 1000) return `$${(n/1000).toFixed(0)}K`;
  return `$${n.toLocaleString()}`;
}

function fmtDate(val) {
  if (!val) return "—";
  try { return new Date(val).toLocaleDateString("es-CO", { year: "numeric", month: "short", day: "numeric" }); }
  catch { return val; }
}

        <div className="sidebar-nav">
          <div className="nav-section-label">Plataforma</div>
          {navItems.map(item => (
            <div key={item.id} className={`nav-item ${page === item.id ? 'active' : ''}`} onClick={() => setPage(item.id)}>
              <span className="nav-icon">{item.icon}</span>
              {item.label}
            </div>
          ))}
        </div>
        <div className="sidebar-footer">
          <div className="user-card">
            <div className="user-avatar">{initials}</div>
            <div className="user-info">
              <div className="uname">{user.name?.split(" ")[0] || "Usuario"}</div>
              <div className="uemail">{user.username?.split("@")[0]}</div>
            </div>
          </div>
          <button className="logout-btn" onClick={handleLogout}>Cerrar Sesión</button>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{pageTitles[page]}</div>
          <div className="topbar-actions">
            <div className="topbar-badge">
              <div className="dot"></div>
              {siteInv !== "PENDIENTE_CONFIGURAR" ? "Conectado a SharePoint" : "Modo Demo"}
            </div>
          </div>
        </div>

        {page === "dashboard" && <Dashboard siteInv={siteInv} siteProy={siteProy} />}
        {page === "proyectos" && <ProyectosPage siteId={siteProy} />}
        {page === "activos" && <ActivosPage siteId={siteProy} />}
        {page === "inversionistas" && <InversionistasPage siteId={siteInv} />}
        {page === "hitos" && <HitosPage siteId={siteProy} />}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
