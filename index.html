                  LEG: { bg:'rgba(107,45,164,0.1)', color:'#6B2DA4', border:'rgba(107,45,164,0.3)' },
                  FIN: { bg:'rgba(26,143,168,0.1)', color:'var(--gw-cyan)', border:'rgba(26,143,168,0.3)' },
                  PM:  { bg:'rgba(200,150,12,0.1)', color:'#C8960C', border:'rgba(200,150,12,0.3)' },
                };

                const activeDocs = purchaseSubTab === 'financing' ? financingDocs
                  : purchaseSubTab === 'due_diligence' ? ddDocs
                  : legalAssetDocs;

                const sectionTitle = purchaseSubTab === 'financing' ? '💰 Financing Documents'
                  : purchaseSubTab === 'due_diligence' ? '🔍 Due Diligence Documents'
                  : '⚖️ Legal Asset Documents';

                function renderDocRow(d) {
                  const checked = !!milestones[d.id];
                  const cc = d.coord ? (coordColors[d.coord] || coordColors.PM) : { bg:'rgba(26,143,168,0.1)', color:'var(--gw-cyan)', border:'rgba(26,143,168,0.3)' };
                  const coordLabel = d.coord || '';
                  const nameLabel = d.name || d.provider || '';
                  return (
                    <tr key={d.id} style={{borderBottom:'1px solid var(--gw-border)', opacity: checked ? 0.6 : 1, transition:'opacity 0.2s'}}>
                      <td style={{padding:'10px 12px'}}>
                        <div onClick={() => setMilestones(prev => ({...prev, [d.id]: !prev[d.id]}))}
                          style={checkStyle(checked)}>
                          {checked ? '✓' : ''}
                        </div>
                      </td>
                      <td style={{...tdStyle, fontWeight:600, textDecoration: checked ? 'line-through' : 'none'}}>{d.doc}</td>
                      <td style={tdStyle}>
                        {coordLabel && <span style={{
                          padding:'3px 10px', borderRadius:99, fontSize:11, fontWeight:700,
                          background:cc.bg, color:cc.color, border:`1px solid ${cc.border}`
                        }}>{coordLabel}</span>}
                        {!coordLabel && d.provider && <span style={{
                          padding:'3px 10px', borderRadius:99, fontSize:11, fontWeight:700,
                          background:'rgba(26,143,168,0.1)', color:'var(--gw-cyan)', border:'1px solid rgba(26,143,168,0.3)'
                        }}>{d.provider}</span>}
                      </td>
                      <td style={{...tdStyle, fontWeight:600}}>{nameLabel}</td>
                    </tr>
                  );
                }

                return (
                  <div style={{marginTop:12}}>
                    <div style={{marginBottom:24}}>
                      <div style={{fontSize:15, fontWeight:700, color:'var(--gw-heading)', marginBottom:12, display:'flex', alignItems:'center', gap:8}}>
                        {sectionTitle}
                      </div>
                      <div style={{background:'var(--gw-card)', border:'1px solid var(--gw-border)', borderRadius:12, overflowX:'auto'}}>
                        <table style={{width:'100%', borderCollapse:'collapse', minWidth:650}}>
                          <thead>
                            <tr style={{background:'var(--gw-page-bg)', borderBottom:'2px solid var(--gw-border)'}}>
                              <th style={{...thStyle, width:36}}></th>
                              <th style={thStyle}>Document</th>
                              <th style={thStyle}>Coord / Provider</th>
                              <th style={thStyle}>Responsible</th>
                            </tr>
                          </thead>
                          <tbody>
                            {activeDocs.map(d => renderDocRow(d))}
                          </tbody>
                          <tfoot>
                            <tr style={{background:'var(--gw-page-bg)', borderTop:'2px solid var(--gw-border)'}}>
                              <td colSpan={4} style={{padding:'10px 12px', fontSize:12, color:'var(--gw-muted)', fontWeight:600}}>
                                {activeDocs.filter(d => milestones[d.id]).length} / {activeDocs.length} completed
                              </td>
                            </tr>
                          </tfoot>
                        </table>
                      </div>
                    </div>

                  </div>
                );
              })()}

              {/* ── FOLDER LINKS PER SECTION ── */}
              {SECTION_FOLDERS[section.id] && folderUrl && (
                <div style={{
                  background:'var(--gw-card)', border:'1px solid var(--gw-border)',
                  borderRadius:12, padding:'14px 20px', marginTop:20,
                  display:'flex', alignItems:'center', gap:12, flexWrap:'wrap'
                }}>
                  <span style={{fontSize:13, fontWeight:700, color:'var(--gw-heading)', marginRight:4}}>📂 Documentos:</span>
                  {SECTION_FOLDERS[section.id].map(sf => (
                    <button key={sf.name}
                      onClick={() => window.open(`${folderUrl}/${encodeURIComponent(sf.name)}`, '_blank')}
                      style={{
                        padding:'7px 16px', background:'none', border:'1px solid var(--gw-cyan)',
                        borderRadius:8, fontSize:12, cursor:'pointer', color:'var(--gw-cyan)',
                        fontWeight:600, display:'inline-flex', alignItems:'center', gap:6, transition:'all 0.2s'
                      }}
                      onMouseEnter={e => { e.currentTarget.style.background='rgba(26,143,168,0.08)'; }}
                      onMouseLeave={e => { e.currentTarget.style.background='none'; }}
                    >{sf.icon} {sf.name}</button>
                  ))}
                </div>
              )}

              {/* Notes/Observaciones section */}
              <div style={{
                background:'var(--gw-card)', border:'1px solid var(--gw-border)',
                borderRadius:12, padding:20, marginTop:20
              }}>
                <div style={{fontSize:13, fontWeight:700, color:'var(--gw-heading)', marginBottom:10, display:'flex', alignItems:'center', gap:8}}>
                  📝 Observaciones — {section.label}
                </div>
                <textarea
                  value={notes[section.id] || ''}
                  onChange={e => setNotes(prev => ({...prev, [section.id]: e.target.value}))}
                  placeholder={`Agrega notas, comentarios o pendientes sobre el avance en ${section.label}...`}
                  style={{
                    width:'100%', minHeight:110, padding:'12px 14px',
                    background:'var(--gw-page-bg)', border:'1px solid var(--gw-border)',
                    borderRadius:8, fontSize:13, color:'var(--gw-body)',
                    resize:'vertical', fontFamily:'inherit', boxSizing:'border-box',
                    lineHeight:1.6
                  }}
                />
                <div style={{marginTop:12, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <span style={{fontSize:11, color:'var(--gw-muted)'}}>Los cambios en notas se guardan juntos</span>
                  <button onClick={saveMilestonesAndNotes} disabled={savingMilestones} style={{
                    padding:'8px 18px', background:section.color, color:'white',
                    border:'none', borderRadius:8, fontSize:13, cursor:'pointer', fontWeight:600,
                    opacity: savingMilestones ? 0.7 : 1
                  }}>{savingMilestones ? 'Guardando...' : '💾 Guardar Hitos y Notas'}</button>
                </div>
              </div>

            </div>
          ))}

        </div>{/* end inner content padding */}
        </div>{/* end scrollable wrapper */}
      </div>
    );
  }

  // ── LIST VIEW ──────────────────────────────────────────────────────────────
  return (
    <div className="page">
      {error && <ErrorMsg msg={error} />}
      <div className="section-header">
        <div className="section-title">Proyectos de <span>Inversión</span></div>
        <span style={{fontSize:'12px', color:'var(--gw-muted)'}}>
          Los proyectos se crean automáticamente desde activos aprobados · Haz clic en una fila para ver el detalle completo
        </span>
      </div>

      <div className="table-wrap">
        <div className="table-toolbar">
          <input className="search-input" placeholder="Buscar proyecto..." value={search} onChange={e => setSearch(e.target.value)} />
          <span style={{fontSize:12, color:'var(--gw-muted)', marginLeft:'auto'}}>{filtered.length} proyecto{filtered.length !== 1 ? 's' : ''}</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>Nombre del Proyecto</th>
              <th>LLC</th>
              <th>Etapa Actual</th>
              <th>Progreso Hitos</th>
              <th>Monto Target</th>
              <th>Monto Levantado</th>
              <th>Cierre Est.</th>
              <th>Estado LLC</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan="9"><div className="empty-state"><div className="empty-title">Sin proyectos registrados</div></div></td></tr>
            )}
            {filtered.map(p => {
              const progress = calculateMilestoneProgress(p.fields?.Milestones);
              return (
                <tr key={p.id}
                  onClick={() => openProject(p)}
                  style={{cursor:'pointer'}}
                  onMouseEnter={e => e.currentTarget.style.background='rgba(26,143,168,0.06)'}
                  onMouseLeave={e => e.currentTarget.style.background=''}
                >
                  <td style={{fontWeight:700, color:'var(--gw-cyan)'}}>{p.fields.Title}</td>
                  <td style={{fontSize:12, color:'var(--gw-muted)'}}>{p.fields.NombredelaLLC || "—"}</td>
                  <td>{getEtapaBadge(p.fields.EtapaActual)}</td>
                  <td style={{width:130}}>
                    <div style={{display:'flex', alignItems:'center', gap:8}}>
                      <div style={{flex:1, height:8, background:'var(--gw-border)', borderRadius:4, overflow:'hidden'}}>
                        <div style={{
                          width:`${progress.percentage}%`, height:'100%', borderRadius:4,
                          background: progress.percentage===100 ? 'var(--gw-success)' : progress.percentage>50 ? 'var(--gw-cyan)' : 'var(--gw-warning)',
                          transition:'width 0.3s ease'
                        }} />
                      </div>
                      <span style={{fontSize:11, fontWeight:700, color:'var(--gw-heading)', minWidth:32}}>{progress.percentage}%</span>
                    </div>
                  </td>
                  <td>{fmtMoney(p.fields.MontoTarget)}</td>
                  <td style={{color:'var(--gw-success)'}}>{fmtMoney((parseFloat(p.fields?.MontoLevantado || 0)) + getProjectLoanAmount(p))}</td>
                  <td style={{fontSize:12}}>{fmtDate(p.fields.FechaCierreEstimado)}</td>
                  <td>{getEtapaBadge(p.fields.EstadoLLC)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}


// ==================== ACTIVOS PAGE ====================
function ActivosPage({ siteId }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState("");
  const [showModal, setShowModal] = useState(false);
  const [saving, setSaving] = useState(false);
  const [evaluadores, setEvaluadores] = useState([]);
  const [loadingEvaluadores, setLoadingEvaluadores] = useState(false);
  const [brokerRefChoices, setBrokerRefChoices] = useState([]);
  const [estados, setEstados] = useState([]);
  const [loadingEstados, setLoadingEstados] = useState(false);
  const [editingItem, setEditingItem] = useState(null);
  const [attachments, setAttachments] = useState([]);
  const [loadingAttachments, setLoadingAttachments] = useState(false);
  const [uploadingFiles, setUploadingFiles] = useState(false);

  const [toast, setToast] = useState(null);
  const fileInputRef = useRef(null);

  function showToast(msg, type = 'success') {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }
  
  const [form, setForm] = useState({
    Title:"",
    NombreComercial:"",
    Tipodeactivo:"Oficina",
    Estado:"En evaluación",
    Ubicaci_x00f3_n:"",
    Ciudad:"",
    Estado_x002f_Provincia:"Florida",
    PrecioOferta:"",
    CapRateDisplay:"",
    Equity:"",
    Loan:"",
    EvaluadorName:"",
    CriterioLocation:"Pendiente",
    CriterioTenant:"Pendiente",
    CriterioTesisdeinversi_x00f3_n:"Pendiente",
    Fechadeidentificaci_x00f3_n:"",
    BrokerReferente:"",
    Observacionesdeevaluaci_x00f3_n:""
  });

  const resetForm = () => {
    setForm({
      Title:"",
      NombreComercial:"",
      Tipodeactivo:"Oficina",
      Estado:"En evaluación",
      Ubicaci_x00f3_n:"",
      Ciudad:"",
      Estado_x002f_Provincia:"Florida",
      PrecioOferta:"",
      CapRateDisplay:"",
      Equity:"",
      Loan:"",
      EvaluadorName:"",
      CriterioLocation:"Pendiente",
      CriterioTenant:"Pendiente",
      CriterioTesisdeinversi_x00f3_n:"Pendiente",
      Fechadeidentificaci_x00f3_n:"",
      BrokerReferente:"",
      Observacionesdeevaluaci_x00f3_n:""
    });
    setEditingItem(null);
    setAttachments([]);
  };

  // Cargar opciones del campo Evaluador y Estado desde SharePoint
  useEffect(() => {
    async function loadChoiceColumns() {
      if (!showModal) return;
      setLoadingEvaluadores(true);
      setLoadingEstados(true);
      try {
        // Obtener las columnas de la lista
        const res = await callGraph(`/sites/${siteId}/lists/${LISTS.activos}/columns`);
        
        // Buscar columna Evaluador
        const evaluadorColumn = res.value.find(col => 
          col.name === 'Evaluador' || col.displayName === 'Evaluador'
        );
        if (evaluadorColumn && evaluadorColumn.choice) {
          setEvaluadores(evaluadorColumn.choice.choices || []);
        } else {
          console.log('Columnas disponibles:', res.value.map(c => ({ name: c.name, displayName: c.displayName, type: c.type })));
          setEvaluadores([]);
        }
        
        // Buscar columna Estado
        const estadoColumn = res.value.find(col =>
          col.name === 'Estado' || col.displayName === 'Estado'
        );
        if (estadoColumn && estadoColumn.choice) {
          const choices = estadoColumn.choice.choices || [];
          console.log('[GWealth] Estado choices from SP:', choices);
          setEstados(choices);
        } else {
          setEstados(["E1 — En evaluación","E2 — LOI & BP","E3 — Onboarding","E4 — Investors","E5 — Purchase","E6 — Funding","E7 — Post-Closing","Cancelado","Declinado"]);
        }

        // Buscar columna Tipodeactivo para verificar nombre interno
        const tipoCol = res.value.find(col =>
          col.displayName === 'Tipo de activo' || col.name === 'Tipodeactivo'
        );
        if (tipoCol) {
          console.log('[GWealth] Tipo de activo column:', { name: tipoCol.name, displayName: tipoCol.displayName, readOnly: tipoCol.readOnly });
        }
        // Buscar columna BrokerReferente
        const brokerRefCol = res.value.find(col =>
          col.name === 'BrokerReferente' || col.displayName === 'BrokerReferente' || col.displayName === 'Broker Referente' || col.name === 'Broker_x0020_Referente'
        );
        if (brokerRefCol && brokerRefCol.choice) {
          setBrokerRefChoices(brokerRefCol.choice.choices || []);
        } else {
          setBrokerRefChoices([]);
        }
      } catch(e) {
        console.error('Error cargando columnas:', e);
        setEvaluadores([]);
        setBrokerRefChoices([]);
        setEstados(["E1 — En evaluación","E2 — LOI & BP","E3 — Onboarding","E4 — Investors","E5 — Purchase","E6 — Funding","E7 — Post-Closing","Cancelado","Declinado"]);
      } finally {
        setLoadingEvaluadores(false);
        setLoadingEstados(false);
      }
    }
    loadChoiceColumns();
  }, [showModal, siteId]);

  async function handleFileUpload(e) {
    const files = Array.from(e.target.files);
    if (!files.length || !editingItem) return;
    setUploadingFiles(true);
    try {
      for (const file of files) {
        await uploadAttachment(siteId, LISTS.activos, editingItem.id, file);
      }
      await loadAttachments(editingItem.id);
    } catch(err) {
      alert('Error al subir archivo: ' + err.message);
    } finally {
      setUploadingFiles(false);
      if (fileInputRef.current) fileInputRef.current.value = '';
    }
  }

  async function handleDeleteAttachment(file) {
    if (!window.confirm(`¿Eliminar el archivo "${file.name}"? Esta acción no se puede deshacer.`)) return;
    setDeletingFile(file.name);
    try {
      await deleteAttachment(siteId, file.serverRelativeUrl);
      await loadAttachments(editingItem.id);
    } catch(err) {
      alert('Error al eliminar: ' + err.message);
    } finally {
      setDeletingFile(null);
    }
  }

  async function handleDownloadAttachment(file) {
    setDownloadingFile(file.name);
    try {
      await downloadAttachment(siteId, file);
    } catch(err) {
      alert('Error al descargar: ' + err.message);
    } finally {
      setDownloadingFile(null);
    }
  }

  function openNewModal() {
    resetForm();
    setShowModal(true);
  }

  // Helper: SharePoint Choice columns may return arrays — extract first value as string
  function choiceVal(v, fallback) {
    if (Array.isArray(v)) return v[0] || fallback;
    return v || fallback;
  }

  function openEditModal(item) {
    setEditingItem(item);
    const f = item.fields;
    setForm({
      Title: f.Title || "",
      NombreComercial: f.NombreComercial || "",
      Tipodeactivo: choiceVal(f.Tipodeactivo, "Oficina"),  // Extract string for dropdown display
      Estado: choiceVal(f.Estado, ""),
      Ubicaci_x00f3_n: f.Ubicaci_x00f3_n || "",
      Ciudad: f.Ciudad || "",
      Estado_x002f_Provincia: f.Estado_x002f_Provincia || "Florida",
      PrecioOferta: f.PrecioOferta ? String(f.PrecioOferta) : "",
      CapRateDisplay: f["CapRate_x0028__x0025__x0029_"] ? String(f["CapRate_x0028__x0025__x0029_"] * 100) : "",
      Equity: f.Equity ? String(f.Equity) : "",
      Loan: f.Loan ? String(f.Loan) : "",
      EvaluadorName: choiceVal(f.Evaluador, ""),
      CriterioLocation: choiceVal(f.CriterioLocation, "Pendiente"),
      CriterioTenant: choiceVal(f.CriterioTenant, "Pendiente"),
      CriterioTesisdeinversi_x00f3_n: choiceVal(f.CriterioTesisdeinversi_x00f3_n, "Pendiente"),
      Fechadeidentificaci_x00f3_n: f.Fechadeidentificaci_x00f3_n ? f.Fechadeidentificaci_x00f3_n.split('T')[0] : "",
      BrokerReferente: choiceVal(f.BrokerReferente, ""),
      Observacionesdeevaluaci_x00f3_n: stripHtml(f.Observacionesdeevaluaci_x00f3_n) || ""
    });
    // Cargar adjuntos al abrir el modal
    loadAttachments(item.id);
    setShowModal(true);
  }

  async function loadAttachments(itemId) {
    setLoadingAttachments(true);
    try {
      const files = await getListItemAttachments(siteId, LISTS.activos, itemId);
      setAttachments(files);
    } catch(e) {
      console.error('Error cargando adjuntos:', e);
      setAttachments([]);
    } finally {
      setLoadingAttachments(false);
    }
  }

  // Recargar adjuntos cuando se abre el modal en modo edición
  useEffect(() => {
    if (showModal && editingItem) {
      loadAttachments(editingItem.id);
    }
  }, [showModal, editingItem, siteId]);

  useEffect(() => {
    async function load() {
      try {
        // Descubrir columnas de Activos para mapeo correcto
        await discoverActivosColumns(siteId);
        const res = await callGraph(`/sites/${siteId}/lists/${LISTS.activos}/items?$expand=fields&$top=100`);
        setItems(res.value || []);
      } catch(e) {
        setError(e.message);
      }
      finally { setLoading(false); }
    }
    load();
  }, [siteId]);

  const filtered = items.filter(i => i.fields?.Title?.toLowerCase().includes(search.toLowerCase()));

  async function handleSave() {
    setSaving(true);
    try {
      // Construir objeto con todos los campos del formulario
      // Tipodeactivo es multi-select (casillas) → debe enviarse como array
      const allFields = {
        Title: form.Title,
        NombreComercial: form.NombreComercial || undefined,
        Tipodeactivo: form.Tipodeactivo,
        Estado: form.Estado,
        Ubicaci_x00f3_n: form.Ubicaci_x00f3_n,
        Ciudad: form.Ciudad,
        Estado_x002f_Provincia: form.Estado_x002f_Provincia,
        PrecioOferta: form.PrecioOferta ? parseFloat(form.PrecioOferta) : undefined,
        "CapRate_x0028__x0025__x0029_": form.CapRateDisplay ? parseFloat(form.CapRateDisplay) / 100 : undefined,
        Equity: form.Equity ? parseFloat(form.Equity) : undefined,
        Loan: form.Loan ? parseFloat(form.Loan) : undefined,
        CriterioLocation: form.CriterioLocation,
        CriterioTenant: form.CriterioTenant,
        CriterioTesisdeinversi_x00f3_n: form.CriterioTesisdeinversi_x00f3_n,
        Fechadeidentificaci_x00f3_n: form.Fechadeidentificaci_x00f3_n,
        BrokerReferente: form.BrokerReferente,
        Observacionesdeevaluaci_x00f3_n: form.Observacionesdeevaluaci_x00f3_n
      };

      // Eliminar campos con valor null, undefined o vacío para evitar errores
      const dataToSend = {};
      Object.keys(allFields).forEach(k => {
        const v = allFields[k];
        if (v !== null && v !== undefined && v !== '') dataToSend[k] = v;
      });

      console.log("[GWealth] Enviando datos activo:", JSON.stringify(dataToSend, null, 2));

      if (editingItem) {
        const endpoint = `/sites/${siteId}/lists/${LISTS.activos}/items/${editingItem.id}`;
        await patchGraph(endpoint, { fields: dataToSend });
      } else {
        await postGraph(`/sites/${siteId}/lists/${LISTS.activos}/items`, { fields: dataToSend });
      }
      
      // Recargar lista
      const res = await callGraph(`/sites/${siteId}/lists/${LISTS.activos}/items?$expand=fields&$top=100`);
      setItems(res.value || []);
      setShowModal(false);
      resetForm();
      showToast(editingItem ? 'Activo actualizado correctamente ✔' : 'Activo creado correctamente ✔');
    } catch(e) {
      console.error("Error al guardar:", e);
      alert("Error al guardar: " + (e.message || "Error desconocido"));
    }
    finally { setSaving(false); }
  }

  if (loading) return <Loading />;

  return (
    <div className="page">
      {error && <ErrorMsg msg={error} />}
      <div className="section-header">
        <div className="section-title">Activos <span>Inmobiliarios</span></div>
        <button className="btn btn-primary" onClick={openNewModal}>+ Nuevo Activo</button>
      </div>

      <div className="table-wrap">
        <div className="table-toolbar">
          <input className="search-input" placeholder="Buscar activo..." value={search} onChange={e => setSearch(e.target.value)} />
          <span style={{fontSize:12, color:'var(--gw-muted)', marginLeft:'auto'}}>{filtered.length} activos</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>Activo</th>
              <th>Tipo</th>
              <th>Estado</th>
              <th>Ubicación</th>
              <th>Precio Oferta</th>
              <th>Cap Rate</th>
              <th>Location</th>
              <th>Tenant</th>
              <th>Tesis</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan="10"><div className="empty-state"><div className="empty-title">Sin activos</div></div></td></tr>
            )}
            {filtered.map(a => (
              <tr key={a.id}>
                <td><div style={{fontWeight:600}}>{a.fields.Title}</div>{a.fields.NombreComercial && <div style={{fontSize:11, color:'var(--gw-muted)'}}>{a.fields.NombreComercial}</div>}</td>
                <td style={{fontSize:12}}>{a.fields.Tipodeactivo}</td>
                <td>{getEtapaBadge(a.fields.Estado)}</td>

                <td style={{color:'var(--gw-cyan)'}}>{fmtMoney(a.fields.PrecioOferta)}</td>

                        <div style={{fontSize: '22px', marginBottom: '6px'}}>↻</div>

                    ) : attachments.length > 0 ? (
                      <div style={{display: 'flex', flexDirection: 'column', gap: '8px'}}>
                        {attachments.map((file) => (
                          <div key={file.name} style={{
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'space-between',
                            padding: '10px 14px',
                            background: 'var(--gw-page-bg)',
                            borderRadius: '8px',
                            border: '1px solid var(--gw-border)',
                            gap: '10px'
                          }}>
                            <div style={{display: 'flex', alignItems: 'center', gap: '10px', flex: 1, minWidth: 0}}>
                              <span style={{fontSize: '20px', flexShrink: 0}}>
                                {/\.(pdf)$/i.test(file.name) ? '📕' :
                                 /\.(docx?|xlsx?|pptx?)$/i.test(file.name) ? '📊' :
                                 /\.(jpe?g|png|gif|webp|svg)$/i.test(file.name) ? '🖼️' : '📄'}
                              </span>
                              <div style={{flex: 1, minWidth: 0}}>
                                <div style={{fontSize: '13px', fontWeight: 500, color: 'var(--gw-heading)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'}} title={file.name}>
                                  {file.name}
                                </div>
                                <div style={{fontSize: '11px', color: 'var(--gw-muted)'}}>
                                  {file.size < 1024 ? `${file.size} B` : file.size < 1048576 ? `${(file.size/1024).toFixed(1)} KB` : `${(file.size/1048576).toFixed(1)} MB`}
                                </div>
                              </div>
                            </div>
                            <div style={{display: 'flex', gap: '6px', flexShrink: 0}}>
                              <button
                                type="button"
                                onClick={() => handleDownloadAttachment(file)}
                                disabled={downloadingFile === file.name}
                                title="Descargar archivo"
                                style={{padding: '5px 10px', fontSize: '11px', background: 'var(--gw-cyan-a12)', color: 'var(--gw-cyan-dark)', border: '1px solid var(--gw-border-brand)', borderRadius: '6px', cursor: 'pointer', fontWeight: 500}}
                              >
                                {downloadingFile === file.name ? '⏳' : '⬇ Descargar'}
                              </button>
                              <button
                                type="button"
                                onClick={() => handleDeleteAttachment(file)}
                                disabled={deletingFile === file.name}
                                title="Eliminar archivo"
                                style={{padding: '5px 10px', fontSize: '11px', background: 'rgba(232,80,80,0.08)', color: 'var(--gw-danger)', border: '1px solid rgba(232,80,80,0.2)', borderRadius: '6px', cursor: 'pointer', fontWeight: 500}}
                              >
                                {deletingFile === file.name ? '⏳' : '🗑 Eliminar'}
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div style={{
                        padding: '28px',
                        textAlign: 'center',
                        background: 'var(--gw-page-bg)',
                        borderRadius: '8px',
                        border: '1px dashed var(--gw-border)',
                        color: 'var(--gw-muted)',
                        fontSize: '13px'
                      }}>
                        <div style={{fontSize: '28px', marginBottom: '8px'}}>📁</div>
                        Sin archivos adjuntos.<br/>
                        <span style={{fontSize: '12px'}}>Haz clic en "+ Subir archivo" para agregar documentos.</span>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={() => { setShowModal(false); }}>Cancelar</button>
              <button className="btn btn-primary" onClick={handleSave} disabled={saving || !form.Title || !form.Tipodeactivo || !form.Estado || !form.Ubicaci_x00f3_n || !form.Ciudad || !form.Estado_x002f_Provincia || !form.PrecioOferta || !form.Fechadeidentificaci_x00f3_n}>
                {saving ? "💾 Guardando..." : (editingItem ? "✔ Actualizar Activo" : "Crear Activo")}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Toast de notificación */}
      {toast && (
        <div style={{
          position: 'fixed', bottom: '28px', left: '50%', transform: 'translateX(-50%)',
          background: toast.type === 'success' ? 'var(--gw-success)' : 'var(--gw-danger)',
          color: 'white', padding: '12px 28px', borderRadius: '10px',
          fontSize: '14px', fontWeight: 600, zIndex: 9999,
          boxShadow: '0 4px 20px rgba(0,0,0,0.18)',
          animation: 'fadeInUp 0.25s ease'
        }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

// ==================== INVERSIONISTAS PAGE ====================
function InversionistasPage({ siteId, siteProy, onNavigateTo, onNavigateToProject }) {
  const [items, setItems]           = useState([]);
  const [loading, setLoading]       = useState(true);
  const [error, setError]           = useState(null);
  const [search, setSearch]         = useState("");
  const [filterTipo, setFilterTipo] = useState("all");
  const [filterBroker, setFilterBroker] = useState("all");
  const [viewingInv, setViewingInv] = useState(null);
  const [activeTab, setActiveTab]   = useState('general');
  const [proyectos, setProyectos]   = useState([]);
  const [loadingProy, setLoadingProy] = useState(false);
  const [toast, setToast]           = useState(null);
  const [editingInv, setEditingInv] = useState(false);
  const [invForm, setInvForm]       = useState({});
  const [savingInv, setSavingInv]   = useState(false);
  const [obsModal, setObsModal]     = useState(null);
  const [obsText, setObsText]       = useState('');
  const [savingObs, setSavingObs]   = useState(false);
  const [invDocs, setInvDocs]       = useState([]);
  const [viewMode, setViewMode]     = useState('list'); // 'cards' | 'list'
  const [loadingDocs, setLoadingDocs] = useState(false);
  const [projDocs, setProjDocs]     = useState({});
  const invFileRef = React.useRef(null);
  const [uploadingInvFile, setUploadingInvFile] = useState(false);
  const [invBrokerChoices, setInvBrokerChoices] = useState([]);

  // Load Broker choices from SharePoint columns
  useEffect(() => {
    async function loadBrokerOpts() {
      try {
        const res = await callGraph(`/sites/${siteId}/lists/${LISTS.inversionistas}/columns`);
        const brokerCol = (res.value || []).find(c => c.name === 'Broker' || c.displayName === 'Broker' || c.displayName === 'Broker / Referente');
        if (brokerCol?.choice?.choices) setInvBrokerChoices(brokerCol.choice.choices);
      } catch(e) { console.warn('Could not load broker choices:', e.message); }
    }
    if (siteId) loadBrokerOpts();
  }, [siteId]);

  async function loadInvDocs(invId) {
    setLoadingDocs(true);
    try {
      const files = await getListItemAttachments(siteId, LISTS.inversionistas, invId);
      setInvDocs(files);
    } catch(e) { console.error('Error loading inv docs:', e); setInvDocs([]); }

    // Load project docs for each project in portfolio (using participaciones list)
    if (proyectos.length > 0) {
      const docsByProy = {};
      const invParts = portfolioParts.filter(pt => String(pt.invId) === String(invId));
      const invProyIds = new Set(invParts.map(pt => String(pt._spProyectoId)));
      for (const p of proyectos) {
        if (invProyIds.has(String(p.id))) {
          try {
            const pFiles = await getListItemAttachments(siteProy, LISTS.proyectos, p.id);
            if (pFiles.length > 0) docsByProy[p.id] = { title: p.fields?.Title || '—', files: pFiles };
          } catch {}
        }
      }
      setProjDocs(docsByProy);
    }
    setLoadingDocs(false);
  }

  async function uploadInvDoc(invId, file) {
    setUploadingInvFile(true);
    try {
      await uploadAttachment(siteId, LISTS.inversionistas, invId, file);
      await loadInvDocs(invId);
      showToast('Documento subido correctamente');
    } catch(e) { showToast('Error al subir: ' + e.message, 'error'); }
    finally { setUploadingInvFile(false); }
  }

  async function saveObservacion() {
    if (!obsModal) return;
    setSavingObs(true);
    try {
      await patchGraph(`/sites/${siteId}/lists/${LISTS.inversionistas}/items/${obsModal.id}`, {
        fields: { field_20: obsText }
      });
      const res = await callGraph(`/sites/${siteId}/lists/${LISTS.inversionistas}/items?$expand=fields&$top=500`);
      setItems(res.value || []);
      setObsModal(null);
      showToast('Observaciones guardadas correctamente');
    } catch(e) {
      showToast('Error al guardar: ' + e.message, 'error');
    } finally { setSavingObs(false); }
  }

  function showToast(msg, type='success') {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  }

  function openEditInv(inv) {
    const f = inv.fields || {};
    setInvForm({
      Title:   f.Title   || '',
      field_1: f.field_1 || '',
      EIN: f.EIN || '',
      field_2: f.field_2 || '',
      field_3: f.field_3 || '',
      field_4: f.field_4 || '',
      field_5: f.field_5 || '',
      field_6: f.field_6 || '',
      field_7: f.field_7 || '',
      field_8: f.field_8 || '',
      field_9: f.field_9 || '',
      field_10: f.field_10 || 'Pendiente',
      field_14: f.field_14 || '',
      field_15: f.field_15 || '',
      field_16: f.field_16 || '',
      field_17: f.field_17 || '',
      field_18: f.field_18 || '',
      field_20: f.field_20 || '',
      Broker: f.Broker || '',
      Banco2: f.Banco2 || '', TipoCuenta2: f.TipoCuenta2 || '', NumeroCuenta2: f.NumeroCuenta2 || '', Routing2: f.Routing2 || '', Titular2: f.Titular2 || '',
      ProyectoRelacionado: f.ProyectoRelacionado || '',
    });
    setEditingInv(true);
  }

  async function saveInvForm() {
    if (!viewingInv) return;
    setSavingInv(true);
    try {
      // Build fields object, only including non-empty values and using null for cleared fields
      const fields = {};
      const fieldMap = {
        Title: invForm.Title, field_1: invForm.field_1, EIN: invForm.EIN, field_2: invForm.field_2,
        field_3: invForm.field_3, field_4: invForm.field_4, field_5: invForm.field_5,
        field_6: invForm.field_6, field_7: invForm.field_7, field_8: invForm.field_8,
        field_9: invForm.field_9, field_10: invForm.field_10,
        field_14: invForm.field_14, field_15: invForm.field_15,
        field_16: invForm.field_16, field_17: invForm.field_17,
        field_18: invForm.field_18, field_20: invForm.field_20,
        Broker: invForm.Broker,
        Banco2: invForm.Banco2, TipoCuenta2: invForm.TipoCuenta2,
        NumeroCuenta2: invForm.NumeroCuenta2, Routing2: invForm.Routing2, Titular2: invForm.Titular2,
        ProyectoRelacionado: invForm.ProyectoRelacionado,
      };
      Object.entries(fieldMap).forEach(([k, v]) => {
        if (v !== undefined && v !== '') fields[k] = v;
        else if (v === '' && viewingInv.fields?.[k]) fields[k] = null; // Clear previously set value
      });
      console.log('[GWealth] Saving investor fields:', JSON.stringify(Object.keys(fields)));

      // Try saving all fields first; if it fails, try core fields only
      try {
        await patchGraph(`/sites/${siteId}/lists/${LISTS.inversionistas}/items/${viewingInv.id}`, { fields });
      } catch(e1) {
        console.warn('[GWealth] Full save failed, trying core fields only:', e1.message);
        // Retry with only standard fields (exclude potentially missing columns)
        const coreFields = {};
        ['Title','field_1','EIN','field_2','field_3','field_4','field_5','field_6','field_7','field_8','field_9','field_10','field_14','field_15','field_16','field_17','field_18','field_20','Broker','ProyectoRelacionado'].forEach(k => {
          if (fields[k] !== undefined) coreFields[k] = fields[k];
        });
        await patchGraph(`/sites/${siteId}/lists/${LISTS.inversionistas}/items/${viewingInv.id}`, { fields: coreFields });
        showToast('⚠️ Guardado parcial: algunos campos adicionales no existen en SharePoint', 'error');
      }

      const res = await callGraph(`/sites/${siteId}/lists/${LISTS.inversionistas}/items?$expand=fields&$top=500`);
      const updated = res.value || [];
      setItems(updated);
      const fresh = updated.find(i => i.id === viewingInv.id);
      if (fresh) setViewingInv(fresh);
      setEditingInv(false);
      showToast('✅ Inversionista actualizado correctamente');
    } catch(e) {
      console.error('[GWealth] Save investor error:', e);
      showToast('❌ Error al guardar: ' + e.message, 'error');
    } finally { setSavingInv(false); }
  }

  useEffect(() => {
    async function load() {
      try {
        const res = await callGraph(`/sites/${siteId}/lists/${LISTS.inversionistas}/items?$expand=fields&$top=500`);
        setItems(res.value || []);
      } catch(e) { setError(e.message); }
      finally { setLoading(false); }
    }
    load();
  }, [siteId]);

  const [portfolioParts, setPortfolioParts] = useState([]);

  async function loadProyectos() {
    if (proyectos.length > 0 || loadingProy || !siteProy) return;
    setLoadingProy(true);
    try {
      const [proyRes, partsData] = await Promise.all([
        callGraph(`/sites/${siteProy}/lists/${LISTS.proyectos}/items?$expand=fields&$top=500`),
        loadAllParticipacionesSP(siteId),
      ]);
      setProyectos(proyRes.value || []);
      setPortfolioParts(partsData || []);
    } catch(e) { console.error('Error loading proyectos for portfolio:', e); }
    finally { setLoadingProy(false); }
  }

  function getPortfolio(invId) {
    const invParts = portfolioParts.filter(pt => String(pt.invId) === String(invId));
    return invParts.map(part => {
      const proyecto = proyectos.find(p => String(p.id) === String(part._spProyectoId));
      return proyecto ? { proyecto, participacion: part } : null;
    }).filter(Boolean);
  }

  function getTipoInv(f) {
    const raw = (f.field_1 || f.TipoInversionista || '').toLowerCase();
    if (raw.includes('juridica') || raw.includes('llc') || raw.includes('empresa')) return 'juridica';
    return 'natural';
  }

  function getInitials(name) {
    return (name || '?').split(' ').filter(Boolean).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function getPhaseLabel(etapa) {
    const e = (etapa || '').toLowerCase();
    if (e.includes('post') || e.includes('closing') || e.includes('rentab')) {
      return { label: 'En Rentabilidad', color: 'var(--gw-success)', bg: 'rgba(46,204,138,0.12)' };
    }
    return { label: 'En Proceso', color: 'var(--gw-cyan)', bg: 'rgba(26,143,168,0.12)' };
  }

  function calcMonto(montoTarget, pct) {
    const t = parseFloat(montoTarget), p = parseFloat(pct);
    if (!t || !p || isNaN(t) || isNaN(p)) return null;
    return t * p / 100;
  }

  function calcPagadoReal(participacion) {
    // Sum actual GFD Recibido + FD Recibido from the participation data
    return (Number(participacion.gfdRecibido) || 0) + (Number(participacion.fdRecibido) || 0);
  }

  function openInv(item) {
    console.log('[GWealth] Opening investor:', item.id, item.fields?.Title);

    setViewingInv(item);
    setActiveTab('general');
    loadProyectos();

  const brokers = [...new Set(items.map(i => i.fields?.Broker).filter(Boolean))].sort();

  const filtered = items.filter(i => {
    const f = i.fields || {};
    const q = search.toLowerCase();
    const nameOk = (f.Title||'').toLowerCase().includes(q) || (f.field_2||'').toLowerCase().includes(q);
    const tipoOk = filterTipo === 'all' || getTipoInv(f) === filterTipo;
    const brokerOk = filterBroker === 'all' || (f.Broker || '') === filterBroker;
    return nameOk && tipoOk && brokerOk;
  });

  if (loading) return <Loading />;

            {getEtapaBadge(f.Estado || 'Prospecto')}

            {/* KPI pills */}
            <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>

                { l:'Capital Pagado',   v: fmtMoney(totalPagado)||'—',   color:'var(--gw-success)' },

            {/* Action buttons */}

                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:20}}>
                  {[
                    { key:'field_2', label:'Correo Electrónico' },
                    { key:'field_3', label:'Teléfono' },
                    { key:'field_4', label:'Dirección / Calle' },
                    { key:'field_5', label:'Ciudad' },
                    { key:'field_6', label:'Estado / Provincia' },
                    { key:'field_7', label:'País' },
                    { key:'field_8', label:'Código Postal / ZIP' },
                  ].map(({key,label}) => (
                    <div key={key}>
                      <div style={{fontSize:11, color:'var(--gw-muted)', fontWeight:700, textTransform:'uppercase', marginBottom:4}}>{label}</div>
                      <input value={invForm[key]||''} onChange={e => setInvForm(p=>({...p,[key]:e.target.value}))}
                        style={{width:'100%', padding:'8px 12px', borderRadius:8, border:'1px solid var(--gw-border)',
                          background:'var(--gw-page-bg)', color:'var(--gw-body)', fontSize:13, boxSizing:'border-box'}} />

                </div>

                {/* Bancario */}

                      <input value={invForm[key]||''} onChange={e => setInvForm(p=>({...p,[key]:e.target.value}))}
                        style={{width:'100%', padding:'8px 12px', borderRadius:8, border:'1px solid var(--gw-border)',
                          background:'var(--gw-page-bg)', color:'var(--gw-body)', fontSize:13, boxSizing:'border-box'}} />
                    </div>
                  ))}
                  <div>
                    <div style={{fontSize:11, color:'var(--gw-muted)', fontWeight:700, textTransform:'uppercase', marginBottom:4}}>Proyecto Relacionado</div>
                    <select value={invForm.ProyectoRelacionado||''} onChange={e => setInvForm(p=>({...p, ProyectoRelacionado:e.target.value}))}
                      style={{width:'100%', padding:'8px 12px', borderRadius:8, border:'1px solid var(--gw-border)',

                      const phase     = getPhaseLabel(pf.EtapaActual);
                      const pctPagado = montoInv > 0 ? Math.round(montoPag / montoInv * 100) : 0;
                      const aporteLabel = pctPagado >= 100
                        ? { label:'✅ Aportes Completos', bg:'rgba(46,204,138,0.12)', color:'var(--gw-success)' }
                        : pctPagado > 0
                          ? { label:`🔄 ${pctPagado}% Recibido`, bg:'rgba(26,143,168,0.12)', color:'var(--gw-cyan)' }
                          : { label:'⏳ Aportes Pendientes', bg:'rgba(232,160,48,0.12)', color:'var(--gw-warning)' };
                      const ac = aporteLabel;
                      const pendiente = montoInv - montoPag;

                      return (
                        <div key={proyecto.id} style={{
                          background:'var(--gw-card)', borderRadius:16,
                          border:'1px solid var(--gw-border)', borderLeft:'5px solid var(--gw-cyan)',
                          padding:'20px 24px', position:'relative', overflow:'hidden'
                        }}>
                          <div style={{position:'absolute', top:0, left:0, right:0, height:56, background:'linear-gradient(90deg, rgba(26,143,168,0.07) 0%, transparent 70%)', pointerEvents:'none', borderRadius:'16px 16px 0 0'}} />

                          {/* Project header */}
                          <div style={{display:'flex', gap:14, alignItems:'flex-start', marginBottom:16, flexWrap:'wrap'}}>
                            <div style={{flex:1, minWidth:160}}>
                              <div style={{fontSize:16, fontWeight:700, color:'var(--gw-heading)', marginBottom:3}}>{pf.Title || '—'}</div>
                              <div style={{fontSize:12, color:'var(--gw-muted)'}}>{pf.NombredelaLLC || '—'}</div>
                            </div>
                            {getEtapaBadge(pf.EtapaActual)}
                            <span style={{padding:'5px 12px', borderRadius:99, fontSize:12, fontWeight:700, background:phase.bg, color:phase.color, flexShrink:0}}>
                              {phase.label}
                            </span>
                          </div>

                          {/* Metrics grid */}
                          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(145px,1fr))', gap:10, marginBottom:14}}>
                            {[
                              { label:'% Participación',  value:`${participacion.porcentaje}%`,  color:'var(--gw-heading)' },
                              { label:'Monto Inversión',  value:fmtMoney(montoInv),              color:'var(--gw-heading)' },
                              { label:'Monto Pagado',     value:fmtMoney(montoPag),              color:'var(--gw-success)' },
                              { label:'Pendiente',        value:fmtMoney(pendiente),             color: pendiente===0 ? 'var(--gw-success)' : 'var(--gw-warning)' },
                            ].map(m => (
                              <div key={m.label} style={{background:'var(--gw-page-bg)', borderRadius:10, border:'1px solid var(--gw-border)', padding:'10px 14px'}}>
                                <div style={{fontSize:10, color:'var(--gw-muted)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:4}}>{m.label}</div>
                                <div style={{fontSize:15, fontWeight:800, color:m.color}}>{m.value || '—'}</div>
                              </div>
                            ))}
                          </div>

                          {/* Footer */}
                          <div style={{display:'flex', gap:10, alignItems:'center', justifyContent:'space-between', flexWrap:'wrap'}}>
                            <span style={{padding:'5px 12px', borderRadius:99, fontSize:12, fontWeight:700, background:ac.bg, color:ac.color}}>{ac.label}</span>
                            {(onNavigateToProject || onNavigateTo) && (
                              <button onClick={() => onNavigateToProject ? onNavigateToProject(proyecto) : onNavigateTo('proyectos')} style={{
                                padding:'6px 14px', background:'none', border:'1px solid var(--gw-border)',
                                borderRadius:8, cursor:'pointer', fontSize:12, color:'var(--gw-cyan)',
                                display:'flex', alignItems:'center', gap:6, fontWeight:600
                              }}>Ver proyecto →</button>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {/* ── DOCUMENTOS TAB ── */}
            {!editingInv && activeTab === 'documentos' && (() => {
              const invName = viewingInv?.fields?.Title || '';
              const baseUrl = `https://gwealthm.sharepoint.com/sites/Inversionistas/Documentos%20de%20Inversionistas/${encodeURIComponent(invName)}`;
              const folders = [
                { name: 'Identificacion', icon: '🪪', desc: 'Documentos de identidad, pasaporte, KYC' },
                { name: 'Bancario', icon: '🏦', desc: 'Certificaciones bancarias, formularios' },
              ];
              return (
                <div style={{display:'flex', flexDirection:'column', gap:20}}>

                  {/* Carpeta principal */}
                  <div style={{background:'var(--gw-card)', borderRadius:16, border:'1px solid var(--gw-border)', borderTop:'3px solid #7B61FF', padding:'24px'}}>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
                      <div>
                        <div style={{fontSize:16, fontWeight:700, color:'var(--gw-heading)'}}>📂 Documentos del Inversionista</div>
                        <div style={{fontSize:12, color:'var(--gw-muted)', marginTop:4}}>{invName}</div>
                      </div>
                      <button onClick={() => window.open(baseUrl, '_blank')}
                        style={{padding:'8px 18px', background:'none', border:'1px solid var(--gw-cyan)', borderRadius:8, fontSize:12, cursor:'pointer', color:'var(--gw-cyan)', fontWeight:600, display:'flex', alignItems:'center', gap:6}}>
                        📂 Abrir carpeta en SharePoint
                      </button>
                    </div>

                    {/* Subcarpetas */}
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
                      {folders.map(sf => (
                        <div key={sf.name}
                          onClick={() => window.open(`${baseUrl}/${encodeURIComponent(sf.name)}`, '_blank')}
                          style={{
                            background:'var(--gw-page-bg)', borderRadius:12, border:'1px solid var(--gw-border)',
                            padding:'20px', cursor:'pointer', transition:'all 0.2s', display:'flex', gap:14, alignItems:'center'
                          }}
                          onMouseEnter={e => { e.currentTarget.style.borderColor='var(--gw-cyan)'; e.currentTarget.style.boxShadow='0 4px 16px rgba(26,143,168,0.12)'; }}
                          onMouseLeave={e => { e.currentTarget.style.borderColor='var(--gw-border)'; e.currentTarget.style.boxShadow='none'; }}>
                          <div style={{width:48, height:48, borderRadius:12, background:'rgba(26,143,168,0.1)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:24, flexShrink:0}}>
                            {sf.icon}
                          </div>
                          <div style={{flex:1}}>
                            <div style={{fontSize:14, fontWeight:700, color:'var(--gw-heading)', marginBottom:2}}>{sf.name}</div>
                            <div style={{fontSize:12, color:'var(--gw-muted)'}}>{sf.desc}</div>
                          </div>
                          <span style={{fontSize:18, color:'var(--gw-cyan)'}}>→</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Nota informativa */}
                  <div style={{padding:'14px 18px', background:'rgba(26,143,168,0.06)', borderRadius:10, border:'1px solid rgba(26,143,168,0.15)', fontSize:12, color:'var(--gw-muted)', lineHeight:1.5}}>
                    💡 Las carpetas se crean automáticamente en SharePoint cuando se registra un nuevo inversionista. Los documentos legales por proyecto (TS, SA, OA) se encuentran en la carpeta del proyecto correspondiente.
                  </div>
                </div>
              );
            })()}

          </div>
        </div>{/* end scrollable content */}
      </div>
    );
  }

  // ── LIST VIEW ────────────────────────────────────────────────────────────────
  return (
    <div className="page">
      {error && <ErrorMsg msg={error} />}
      <div className="section-header">
        <div className="section-title">Inversionistas <span>Registrados</span></div>
        <span style={{fontSize:'12px', color:'var(--gw-muted)'}}>
          Haz clic en un inversionista para ver su perfil completo y portafolio
        </span>
      </div>

      {/* Toolbar */}
      <div style={{display:'flex', gap:12, marginBottom:24, flexWrap:'wrap', alignItems:'center'}}>
        <input className="search-input" style={{flex:'1 1 220px'}}
          placeholder="Buscar por nombre o correo..."
          value={search} onChange={e => setSearch(e.target.value)} />
        <select value={filterTipo} onChange={e => setFilterTipo(e.target.value)}
          style={{padding:'8px 14px', borderRadius:8, border:'1px solid var(--gw-border)', background:'var(--gw-card)', color:'var(--gw-body)', fontSize:13, cursor:'pointer'}}>
          <option value="all">👥 Todos los tipos</option>
          <option value="natural">👤 Personas Naturales</option>
          <option value="juridica">🏢 Personas Jurídicas / LLC</option>
        </select>
        <select value={filterBroker} onChange={e => setFilterBroker(e.target.value)}
          style={{padding:'8px 14px', borderRadius:8, border:'1px solid var(--gw-border)', background:'var(--gw-card)', color:'var(--gw-body)', fontSize:13, cursor:'pointer'}}>
          <option value="all">🤝 Todos los brokers</option>
          {brokers.map(b => <option key={b} value={b}>{b}</option>)}
        </select>
        <span style={{fontSize:12, color:'var(--gw-muted)', whiteSpace:'nowrap'}}>
          {filtered.length} inversionista{filtered.length !== 1 ? 's' : ''}
        </span>
        <div style={{display:'flex', gap:2, background:'var(--gw-page-bg)', borderRadius:8, border:'1px solid var(--gw-border)', padding:2}}>
          <button onClick={() => setViewMode('list')}
            style={{padding:'6px 10px', borderRadius:6, border:'none', cursor:'pointer', fontSize:14,
              background: viewMode==='list' ? 'var(--gw-cyan)' : 'transparent',
              color: viewMode==='list' ? 'white' : 'var(--gw-muted)', transition:'all 0.2s'
            }} title="Vista de lista">☰</button>
          <button onClick={() => setViewMode('cards')}
            style={{padding:'6px 10px', borderRadius:6, border:'none', cursor:'pointer', fontSize:14,
              background: viewMode==='cards' ? 'var(--gw-cyan)' : 'transparent',
              color: viewMode==='cards' ? 'white' : 'var(--gw-muted)', transition:'all 0.2s'
            }} title="Vista de tarjetas">▦</button>
        </div>
      </div>

      {/* Empty state */}
      {filtered.length === 0 && (
        <div style={{textAlign:'center', padding:'60px 24px', background:'var(--gw-card)', borderRadius:16, border:'1px solid var(--gw-border)'}}>
          <div style={{fontSize:40, marginBottom:12}}>🔍</div>
          <div style={{fontSize:16, fontWeight:700, color:'var(--gw-heading)'}}>Sin resultados</div>
          <div style={{fontSize:14, color:'var(--gw-muted)', marginTop:4}}>Ajusta los filtros o el término de búsqueda</div>
        </div>
      )}

      {/* List view */}
      {filtered.length > 0 && viewMode === 'list' && (
        <div style={{background:'var(--gw-card)', border:'1px solid var(--gw-border)', borderRadius:12, overflowX:'auto'}}>
          <table style={{width:'100%', borderCollapse:'collapse', minWidth:900}}>
            <thead>
              <tr style={{background:'var(--gw-page-bg)', borderBottom:'2px solid var(--gw-border)'}}>
                <th style={{padding:'10px 14px', textAlign:'left', fontSize:11, fontWeight:700, color:'var(--gw-muted)', textTransform:'uppercase', letterSpacing:'0.5px'}}>Nombre</th>
                <th style={{padding:'10px 14px', textAlign:'left', fontSize:11, fontWeight:700, color:'var(--gw-muted)', textTransform:'uppercase', letterSpacing:'0.5px'}}>Tipo</th>
                <th style={{padding:'10px 14px', textAlign:'left', fontSize:11, fontWeight:700, color:'var(--gw-muted)', textTransform:'uppercase', letterSpacing:'0.5px'}}>Estado</th>
                <th style={{padding:'10px 14px', textAlign:'left', fontSize:11, fontWeight:700, color:'var(--gw-muted)', textTransform:'uppercase', letterSpacing:'0.5px'}}>Correo</th>
                <th style={{padding:'10px 14px', textAlign:'left', fontSize:11, fontWeight:700, color:'var(--gw-muted)', textTransform:'uppercase', letterSpacing:'0.5px'}}>Teléfono</th>
                <th style={{padding:'10px 14px', textAlign:'left', fontSize:11, fontWeight:700, color:'var(--gw-muted)', textTransform:'uppercase', letterSpacing:'0.5px'}}>Ubicación</th>
                <th style={{padding:'10px 14px', textAlign:'left', fontSize:11, fontWeight:700, color:'var(--gw-muted)', textTransform:'uppercase', letterSpacing:'0.5px'}}>Broker</th>
                <th style={{padding:'10px 14px', textAlign:'center', fontSize:11, fontWeight:700, color:'var(--gw-muted)', textTransform:'uppercase', letterSpacing:'0.5px'}}>Acciones</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(item => {
                const f = item.fields || {};
                const tipo = getTipoInv(f);
                const initials = getInitials(f.Title);
                return (
                  <tr key={item.id} onClick={() => openInv(item)}
                    style={{borderBottom:'1px solid var(--gw-border)', cursor:'pointer', transition:'background 0.15s'}}
                    onMouseEnter={e => e.currentTarget.style.background='rgba(26,143,168,0.04)'}
                    onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                    <td style={{padding:'10px 14px'}}>
                      <div style={{display:'flex', alignItems:'center', gap:10}}>
                        <div style={{
                          width:32, height:32, borderRadius:8, flexShrink:0,
                          background: tipo==='juridica' ? 'rgba(26,143,168,0.15)' : 'rgba(46,204,138,0.15)',
                          display:'flex', alignItems:'center', justifyContent:'center',
                          fontSize: tipo==='juridica' ? 15 : 11, fontWeight:800,
                          color: tipo==='juridica' ? 'var(--gw-cyan)' : 'var(--gw-success)'
                        }}>{tipo==='juridica' ? '🏢' : initials}</div>
                        <span style={{fontWeight:600, fontSize:13, color:'var(--gw-heading)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:200}}>{f.Title || '—'}</span>
                      </div>
                    </td>
                    <td style={{padding:'10px 14px', fontSize:12, color:'var(--gw-muted)'}}>{tipo==='juridica' ? 'Jurídica' : 'Natural'}</td>
                    <td style={{padding:'10px 14px'}}>{getEtapaBadge(f.Estado || 'Prospecto')}</td>
                    <td style={{padding:'10px 14px', fontSize:12, color:'var(--gw-muted)', maxWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{f.field_2 || '—'}</td>
                    <td style={{padding:'10px 14px', fontSize:12, color:'var(--gw-muted)', whiteSpace:'nowrap'}}>{f.field_3 || '—'}</td>
                    <td style={{padding:'10px 14px', fontSize:12, color:'var(--gw-muted)', whiteSpace:'nowrap'}}>{[f.field_5, f.field_7].filter(Boolean).join(', ') || '—'}</td>
                    <td style={{padding:'10px 14px'}}>
                      {f.Broker ? <span style={{fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:99, background:'rgba(232,160,48,0.12)', color:'var(--gw-warning)', whiteSpace:'nowrap'}}>{f.Broker}</span> : <span style={{fontSize:12, color:'var(--gw-muted)'}}>—</span>}
                    </td>
                    <td style={{padding:'10px 14px', textAlign:'center'}}>
                      <div style={{display:'flex', gap:4, justifyContent:'center'}}>
                        <button onClick={e => { e.stopPropagation(); setViewingInv(item); openEditInv(item); }}
                          style={{fontSize:11, background:'none', border:'1px solid var(--gw-border)', borderRadius:6, padding:'3px 8px', cursor:'pointer', color:'var(--gw-muted)', transition:'all 0.15s'}}
                          onMouseEnter={e => { e.currentTarget.style.borderColor='var(--gw-cyan)'; e.currentTarget.style.color='var(--gw-cyan)'; }}
                          onMouseLeave={e => { e.currentTarget.style.borderColor='var(--gw-border)'; e.currentTarget.style.color='var(--gw-muted)'; }}
                        >✏️</button>
                        <button onClick={e => { e.stopPropagation(); setObsText(f.field_20 || ''); setObsModal(item); }}
                          style={{fontSize:11, background:'none', border:'1px solid var(--gw-border)', borderRadius:6, padding:'3px 8px', cursor:'pointer', color:'var(--gw-muted)', transition:'all 0.15s', position:'relative'}}
                          onMouseEnter={e => { e.currentTarget.style.borderColor='var(--gw-warning)'; e.currentTarget.style.color='var(--gw-warning)'; }}
                          onMouseLeave={e => { e.currentTarget.style.borderColor='var(--gw-border)'; e.currentTarget.style.color='var(--gw-muted)'; }}
                        >📝{f.field_20 ? '●' : ''}</button>
                        {(f.Estado === 'Prospecto' || !f.Estado) && (
                          <button onClick={async e => {
                            e.stopPropagation();
                            if (!confirm(`¿Activar a ${f.Title}? Esto creará sus carpetas en SharePoint.`)) return;
                            try {
                              await patchGraph(`/sites/${siteId}/lists/${LISTS.inversionistas}/items/${item.id}`, { fields: { Estado: 'Activo' } });
                              setItems(prev => prev.map(i => i.id === item.id ? {...i, fields: {...i.fields, Estado: 'Activo'}} : i));
                              showToast(`✅ ${f.Title} activado`);
                            } catch(err) { showToast('❌ Error: ' + err.message, 'error'); }
                          }}
                            style={{fontSize:11, background:'rgba(46,204,138,0.1)', border:'1px solid rgba(46,204,138,0.3)', borderRadius:6, padding:'3px 8px', cursor:'pointer', color:'var(--gw-success)', fontWeight:700, transition:'all 0.15s'}}
                            onMouseEnter={e => e.currentTarget.style.background='rgba(46,204,138,0.2)'}
                            onMouseLeave={e => e.currentTarget.style.background='rgba(46,204,138,0.1)'}
                          >✅</button>
                        )}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Cards grid */}
      {filtered.length > 0 && viewMode === 'cards' && (
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(290px,1fr))', gap:16}}>
          {filtered.map(item => {
            const f       = item.fields || {};
            const tipo    = getTipoInv(f);
            const initials= getInitials(f.Title);
            return (
              <div key={item.id} onClick={() => openInv(item)}
                style={{
                  cursor:'pointer', background:'var(--gw-card)',
                  borderRadius:16, border:'1px solid var(--gw-border)',
                  borderTop:`3px solid ${tipo==='juridica' ? 'var(--gw-cyan)' : 'var(--gw-success)'}`,
                  padding:'20px', boxShadow:'0 2px 8px rgba(0,0,0,0.05)',
                  position:'relative', overflow:'hidden', transition:'transform 0.15s, box-shadow 0.15s'
                }}
                onMouseEnter={e => { e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.10)'; }}
                onMouseLeave={e => { e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.05)'; }}
              >
                {/* Header row */}
                <div style={{display:'flex', gap:14, alignItems:'flex-start', marginBottom:14}}>
                  <div style={{
                    width:44, height:44, borderRadius:11, flexShrink:0,
                    background: tipo==='juridica' ? 'rgba(26,143,168,0.15)' : 'rgba(46,204,138,0.15)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize: tipo==='juridica' ? 20 : 14, fontWeight:800,
                    color: tipo==='juridica' ? 'var(--gw-cyan)' : 'var(--gw-success)'
                  }}>
                    {tipo==='juridica' ? '🏢' : initials}
                  </div>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontWeight:700, fontSize:15, color:'var(--gw-heading)', marginBottom:2, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{f.Title || '—'}</div>
                    <div style={{fontSize:12, color:'var(--gw-muted)'}}>{tipo==='juridica' ? 'Persona Jurídica / LLC' : 'Persona Natural'}</div>
                  </div>
                  <div style={{display:'flex', flexDirection:'column', gap:4, alignItems:'flex-end'}}>
                    {getEtapaBadge(f.Estado || 'Prospecto')}
                    {f.Broker && <span style={{fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:99, background:'rgba(232,160,48,0.12)', color:'var(--gw-warning)', whiteSpace:'nowrap'}}>🤝 {f.Broker}</span>}
                  </div>
                </div>

                {/* Divider */}
                <div style={{height:1, background:'var(--gw-border)', marginBottom:12}} />

                {/* Contact info */}
                <div style={{display:'flex', flexDirection:'column', gap:7}}>
                  {f.field_2 && (
                    <div style={{display:'flex', gap:8, alignItems:'center'}}>
                      <span style={{fontSize:13, flexShrink:0}}>✉️</span>
                      <span style={{fontSize:13, color:'var(--gw-muted)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{f.field_2}</span>
                    </div>
                  )}
                  {f.field_3 && (
                    <div style={{display:'flex', gap:8, alignItems:'center'}}>
                      <span style={{fontSize:13, flexShrink:0}}>📞</span>
                      <span style={{fontSize:13, color:'var(--gw-muted)'}}>{f.field_3}</span>
                    </div>
                  )}
                  {(f.field_5 || f.field_7) && (
                    <div style={{display:'flex', gap:8, alignItems:'center'}}>
                      <span style={{fontSize:13, flexShrink:0}}>📍</span>
                      <span style={{fontSize:13, color:'var(--gw-muted)'}}>{[f.field_5, f.field_7].filter(Boolean).join(', ')}</span>
                    </div>
                  )}
                  {!f.field_2 && !f.field_3 && !f.field_5 && (
                    <div style={{fontSize:12, color:'var(--gw-muted)', fontStyle:'italic', padding:'4px 0'}}>Sin datos de contacto registrados</div>
                  )}
                </div>

                {/* Footer */}
                <div style={{marginTop:14, display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                  <div style={{display:'flex', gap:6}}>
                    <button onClick={e => { e.stopPropagation(); setViewingInv(item); openEditInv(item); }}
                      style={{fontSize:12, background:'none', border:'1px solid var(--gw-border)',
                        borderRadius:6, padding:'4px 10px', cursor:'pointer', color:'var(--gw-muted)',
                        transition:'border-color 0.15s, color 0.15s'}}
                      onMouseEnter={e => { e.currentTarget.style.borderColor='var(--gw-cyan)'; e.currentTarget.style.color='var(--gw-cyan)'; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor='var(--gw-border)'; e.currentTarget.style.color='var(--gw-muted)'; }}
                    >✏️ Editar</button>
                    <button onClick={e => { e.stopPropagation(); setObsText(f.field_20 || ''); setObsModal(item); }}
                      style={{fontSize:12, background:'none', border:'1px solid var(--gw-border)',
                        borderRadius:6, padding:'4px 10px', cursor:'pointer', color:'var(--gw-muted)',
                        transition:'border-color 0.15s, color 0.15s', position:'relative'}}
                      onMouseEnter={e => { e.currentTarget.style.borderColor='var(--gw-warning)'; e.currentTarget.style.color='var(--gw-warning)'; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor='var(--gw-border)'; e.currentTarget.style.color='var(--gw-muted)'; }}
                    >📝 Obs{f.field_20 ? ' ●' : ''}</button>
                  </div>
                  <span style={{fontSize:12, color:'var(--gw-cyan)', fontWeight:600}}>Ver perfil →</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── OBSERVACIONES MODAL ── */}
      {obsModal && (
        <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:9999}}
          onClick={() => setObsModal(null)}>
          <div style={{background:'var(--gw-surface)', borderRadius:16, padding:'28px', width:520, maxWidth:'90vw', maxHeight:'80vh', overflow:'auto',
            border:'1px solid var(--gw-border)', boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}
            onClick={e => e.stopPropagation()}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18}}>
              <div>
                <div style={{fontSize:16, fontWeight:700, color:'var(--gw-heading)'}}>📝 Observaciones</div>
                <div style={{fontSize:13, color:'var(--gw-muted)', marginTop:2}}>{obsModal.fields?.Title || ''}</div>
              </div>
              <button onClick={() => setObsModal(null)} style={{background:'none', border:'none', fontSize:18, cursor:'pointer', color:'var(--gw-muted)', padding:'4px'}}>✕</button>
            </div>
            <textarea value={obsText} onChange={e => setObsText(e.target.value)} rows={8} placeholder="Agregar observaciones sobre este inversionista..."
              style={{width:'100%', padding:'12px', borderRadius:10, border:'1px solid var(--gw-border)', background:'var(--gw-page-bg)',
                color:'var(--gw-body)', fontSize:13, resize:'vertical', boxSizing:'border-box', lineHeight:1.5, marginBottom:16}} />
            <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
              <button onClick={() => setObsModal(null)} style={{padding:'8px 18px', background:'var(--gw-border)', border:'none', borderRadius:8, cursor:'pointer', fontWeight:600, color:'var(--gw-body)', fontSize:13}}>Cancelar</button>
              <button onClick={saveObservacion} disabled={savingObs} style={{padding:'8px 18px', background:'var(--gw-cyan)', color:'white', border:'none', borderRadius:8, cursor:'pointer', fontWeight:700, fontSize:13, opacity: savingObs ? 0.6 : 1}}>
                {savingObs ? 'Guardando...' : 'Guardar'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ==================== NAVIGATION ====================
function Sidebar({ user, activeTab, setActiveTab, onLogout, isOpen, onClose }) {
  const navItems = [
    { id: 'dashboard', label: 'Dashboard', icon: '📊' },
    { id: 'proyectos', label: 'Proyectos', icon: '📁' },
    { id: 'activos', label: 'Activos', icon: '🏢' },
    { id: 'inversionistas', label: 'Inversionistas', icon: '👤' },
  ];

  const handleNavClick = (itemId) => {
    setActiveTab(itemId);
    if (onClose) onClose();
  };

  return (
    <div className={`sidebar ${isOpen ? 'open' : ''}`}>
      <div className="sidebar-logo">
        <div className="sidebar-logo-icon">
          <img src={ASSETS.logo} alt="GWealth" />
        </div>
        <div className="sidebar-logo-text">
          <div className="name">GWealth</div>
          <div className="sub">IMA Platform</div>
        </div>
      </div>
      
      <div className="sidebar-nav">
        <div className="nav-section-label">Menú Principal</div>
        {navItems.map(item => (
          <div 
            key={item.id}
            className={`nav-item ${activeTab === item.id ? 'active' : ''}`}
            onClick={() => handleNavClick(item.id)}
          >
            <span className="nav-icon">{item.icon}</span>
            <span>{item.label}</span>
          </div>
        ))}
      </div>
      
      <div className="sidebar-footer">
        <div className="user-card">
          <div className="user-avatar">{user?.name?.[0] || 'U'}</div>
          <div className="user-info">
            <div className="uname">{user?.name || 'Usuario'}</div>
            <div className="uemail">{user?.username || ''}</div>
          </div>
        </div>
        <button className="logout-btn" onClick={onLogout}>Cerrar Sesión</button>
      </div>
    </div>
  );
}

function Topbar({ title, onMenuClick }) {
  return (
    <div className="topbar">
      <div style={{ display: 'flex', alignItems: 'center' }}>
        <button className="menu-toggle" onClick={onMenuClick} aria-label="Menú">
          ☰
        </button>
        <div className="topbar-title">{title}</div>
      </div>
      <div className="topbar-actions">
        <div className="topbar-badge">
          <span className="dot"></span>
          <span>Sistema Activo</span>
        </div>
      </div>
    </div>
  );
}

// ==================== MAIN APP ====================
function App() {
  const [isAuthenticated, setIsAuthenticated] = useState(false);
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('dashboard');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [pendingProject, setPendingProject] = useState(null);

  useEffect(() => {
    msalInstance.initialize().then(() => {
      // handleRedirectPromise procesa el token cuando el popup redirige de vuelta
      return msalInstance.handleRedirectPromise();
    }).then((tokenResponse) => {
      if (tokenResponse) {
        // Llegamos aquí cuando el popup completó el redirect con el auth code
        const account = tokenResponse.account;
        msalInstance.setActiveAccount(account);
        setUser({ name: account.name, username: account.username });
        setIsAuthenticated(true);
      } else {
        // Carga normal: revisar si ya hay sesión activa
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
          msalInstance.setActiveAccount(accounts[0]);
          setUser({ name: accounts[0].name, username: accounts[0].username });
          setIsAuthenticated(true);
        }
      }
    }).catch(err => {
      console.error("MSAL init/redirect error:", err);
    }).finally(() => {
      setLoading(false);
    });
  }, []);

  // Cerrar sidebar al cambiar de tamaño a desktop
  useEffect(() => {
    const handleResize = () => {
      if (window.innerWidth > 767) {
        setSidebarOpen(false);
      }
    };
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  const handleLogin = async () => {
    setLoading(true);
    try {
      const response = await msalInstance.loginPopup({
        scopes: CONFIG.scopes,
        redirectUri: CONFIG.redirectUri,
      });
      // Registrar la cuenta activa para que acquireTokenSilent la encuentre siempre
      if (response?.account) {
        msalInstance.setActiveAccount(response.account);
        setUser({ name: response.account.name, username: response.account.username });
        setIsAuthenticated(true);
      }
    } catch (e) {
      if (e.errorCode !== "user_cancelled") {
        console.error("Login error:", e);
        alert("Error al iniciar sesión: " + (e.message || e.errorCode));
      }
    } finally {
      setLoading(false);
    }
  };

  const handleLogout = () => {
    msalInstance.logout();
    setUser(null);
    setIsAuthenticated(false);
  };

  const handleTabChange = (tab) => {
    setActiveTab(tab);
    setSidebarOpen(false);
  };

  const getPageTitle = () => {
    const titles = {
      dashboard: 'Dashboard',
      proyectos: 'Proyectos de Inversión',
      activos: 'Activos Inmobiliarios',
      inversionistas: 'Inversionistas',
    };
    return titles[activeTab] || 'Dashboard';
  };

  const renderContent = () => {
    switch(activeTab) {
      case 'dashboard':
        return <Dashboard siteInv={CONFIG.siteInversionistas} siteProy={CONFIG.siteProyectos} />;
      case 'proyectos':
        return <ProyectosPage siteId={CONFIG.siteProyectos} siteInv={CONFIG.siteInversionistas} onNavigateTo={setActiveTab}
          initialProject={pendingProject} onInitialProjectOpened={() => setPendingProject(null)} />;
      case 'activos':
        return <ActivosPage siteId={CONFIG.siteProyectos} />;
      case 'inversionistas':
        return <InversionistasPage siteId={CONFIG.siteInversionistas} siteProy={CONFIG.siteProyectos} onNavigateTo={setActiveTab}
          onNavigateToProject={proj => { setPendingProject(proj); setActiveTab('proyectos'); }} />;
      default:
        return <Dashboard siteInv={CONFIG.siteInversionistas} siteProy={CONFIG.siteProyectos} />;
    }
  };

  if (loading) {
    return (
      <div style={{minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--gw-page-bg)'}}>
        <Loading text="Iniciando..." />
      </div>
    );
  }

  if (!isAuthenticated) {
    return <LoginScreen onLogin={handleLogin} loading={loading} />;
  }

  return (
    <div className="app">
      {/* Overlay para cerrar menú en móvil */}
      <div 
        className={`sidebar-overlay ${sidebarOpen ? 'open' : ''}`}
        onClick={() => setSidebarOpen(false)}
      />
      
      <Sidebar 
        user={user} 
        activeTab={activeTab} 
        setActiveTab={handleTabChange} 
        onLogout={handleLogout}
        isOpen={sidebarOpen}
        onClose={() => setSidebarOpen(false)}
      />
      
      <div className="main">
        <Topbar 
          title={getPageTitle()} 
          onMenuClick={() => setSidebarOpen(true)}
        />
        {renderContent()}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
