<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMA Platform — GWealth</title>

<!-- Favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="https://www.g-wealth.com/wp-content/uploads/2025/07/cropped-cropped-favicon-g-wealth-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="https://www.g-wealth.com/wp-content/uploads/2025/07/cropped-cropped-favicon-g-wealth-192x192.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://www.g-wealth.com/wp-content/uploads/2025/07/cropped-cropped-favicon-g-wealth-180x180.png">
<link rel="icon" type="image/png" sizes="270x270" href="https://www.g-wealth.com/wp-content/uploads/2025/07/cropped-cropped-favicon-g-wealth-270x270.png">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>

<!-- =============================================
     G-WEALTH APP — COLOR SYSTEM (Light Version)
     Fiel a la imagen corporativa de g-wealth.com
     Base clara + hero oscuro + acento cyan
     ============================================= -->
<style>
  :root {
    /* ── BACKGROUNDS ─────────────────────────────────── */
    --gw-page-bg:         rgba(244, 247, 248, 1);   /* Fondo general de la app        */
    --gw-surface:         rgba(255, 255, 255, 1);   /* Cards, formularios, listas     */
    --gw-hero:            rgba(11, 46, 56, 1);      /* Hero header oscuro             */
    --gw-hero-deep:       rgba(6, 30, 36, 1);       /* Gradiente hero / footer        */
    --gw-footer:          #061E24;                  /* Footer oscuro                  */

    /* ── BRAND — CYAN ────────────────────────────────── */
    --gw-cyan:            rgba(26, 143, 168, 1);    /* CTAs, nav activo, barras       */
    --gw-cyan-light:      rgba(43, 181, 212, 1);    /* Highlights, gradientes         */
    --gw-cyan-dark:       rgba(13, 110, 133, 1);    /* Sombras, extremo barras        */
    --gw-cyan-a12:        rgba(26, 143, 168, 0.12); /* Fondo íconos, nav activo       */
    --gw-cyan-a07:        rgba(26, 143, 168, 0.07); /* Highlight rows suave           */
    --gw-cyan-a10:        rgba(26, 143, 168, 0.10); /* Track de progress bar          */

    /* ── TEXT ────────────────────────────────────────── */
    --gw-heading:         rgba(26, 58, 74, 1);      /* Títulos en fondos claros       */
    --gw-emphasis:        rgba(46, 125, 150, 1);    /* Énfasis, links, valores        */
    --gw-body:            rgba(85, 95, 107, 1);     /* Body text en fondos claros     */
    --gw-body-dark:       rgba(138, 171, 181, 1);   /* Body text en fondos oscuros    */
    --gw-white:           rgba(255, 255, 255, 1);   /* Texto en fondos oscuros        */
    --gw-muted:           #8AABB5;                  /* Texto secundario/muted         */

    /* ── UI ──────────────────────────────────────────── */
    --gw-border:          rgba(203, 216, 220, 0.8); /* Bordes cards y separadores     */
    --gw-border-brand:    rgba(26, 143, 168, 0.2);  /* Bordes con acento de marca     */
    --gw-shadow:          rgba(26, 143, 168, 0.06); /* Sombra sutil de cards          */
    
    /* ── ESTADOS ────────────────────────────────────── */
    --gw-success:         #2ECC8A;
    --gw-warning:         #E8A030;
    --gw-danger:          #E85050;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gw-page-bg);
    color: var(--gw-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--gw-page-bg); }
  ::-webkit-scrollbar-thumb { background: var(--gw-cyan-dark); border-radius: 2px; }

  /* ============================================
     LOGIN SCREEN
     ============================================ */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--gw-hero);
    position: relative;
    overflow: hidden;
  }
  .login-bg {
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(26, 143, 168, 0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(26, 143, 168, 0.08) 0%, transparent 50%),
      linear-gradient(160deg, var(--gw-hero) 0%, var(--gw-hero-deep) 100%);
  }
  .login-blob {
    position: absolute;
    border-radius: 50%;
    background: var(--gw-cyan-dark);
    opacity: 0.25;
    filter: blur(4px);
  }
  .login-blob-1 { width: 300px; height: 300px; top: -100px; right: -100px; }
  .login-blob-2 { width: 200px; height: 200px; bottom: -50px; left: -50px; }
  
  .login-card {
    position: relative;
    width: 420px;
    padding: 56px 48px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 16px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gw-cyan-light), transparent);
  }
  .login-logo-wrap {
    width: 80px; height: 80px;
    margin: 0 auto 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--gw-cyan), var(--gw-cyan-dark));
    position: relative;
    box-shadow: 0 4px 20px rgba(26, 143, 168, 0.3);
  }
  .login-logo-wrap img {
    width: 50px;
    height: 50px;
    object-fit: contain;
  }
  .login-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 300;
    color: var(--gw-white);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .login-subtitle {
    font-size: 12px; color: var(--gw-body-dark);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 40px;
  }
  .login-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    margin-bottom: 36px;
  }
  .login-btn {
    width: 100%;
    padding: 14px 24px;
    background: var(--gw-white);
    border: none;
    color: var(--gw-hero-deep);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    border-radius: 999px;
    position: relative; overflow: hidden;
  }
  .login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(255, 255, 255, 0.3);
  }
  .login-note { font-size: 11px; color: var(--gw-body-dark); margin-top: 20px; }

  /* ============================================
     APP SHELL
     ============================================ */
  .app { display: flex; min-height: 100vh; }

  /* ============================================
     SIDEBAR
     ============================================ */
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--gw-surface);
    border-right: 1px solid var(--gw-border);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 100;
    box-shadow: 2px 0 8px var(--gw-shadow);
  }
  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--gw-border);
    display: flex; align-items: center; gap: 12px;
  }
  .sidebar-logo-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--gw-cyan), var(--gw-cyan-dark));
    flex-shrink: 0;
  }
  .sidebar-logo-icon img {
    width: 28px;
    height: 28px;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }
  .sidebar-logo-text { line-height: 1.2; }
  .sidebar-logo-text .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 600;
    color: var(--gw-heading); letter-spacing: 0.5px;
  }
  .sidebar-logo-text .sub {
    font-size: 10px; color: var(--gw-emphasis);
    letter-spacing: 2px; text-transform: uppercase;
    font-weight: 500;
  }
  .sidebar-nav { padding: 16px 12px; flex: 1; overflow-y: auto; }
  .nav-section-label {
    font-size: 10px; color: var(--gw-muted);
    letter-spacing: 2px; text-transform: uppercase;
    padding: 8px 12px 6px;
    margin-top: 8px;
    font-weight: 600;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--gw-body);
    font-size: 13px; font-weight: 500;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .nav-item:hover { 
    color: var(--gw-cyan); 
    background: var(--gw-cyan-a07); 
  }
  .nav-item.active {
    color: var(--gw-cyan);
    background: var(--gw-cyan-a12);
    border-color: var(--gw-border-brand);
  }
  .nav-item .nav-icon { 
    font-size: 18px; 
    width: 20px; 
    text-align: center;
    opacity: 0.8;
  }
  .nav-item.active .nav-icon {
    opacity: 1;
  }
  .nav-badge {
    margin-left: auto;
    background: var(--gw-cyan);
    color: var(--gw-white);
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 99px;
    min-width: 20px; text-align: center;
  }
  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid var(--gw-border);
  }
  .user-card {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--gw-border);
    background: var(--gw-page-bg);
  }
  .user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gw-cyan), var(--gw-cyan-dark));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--gw-white);
    flex-shrink: 0;
  }
  .user-info .uname { font-size: 12px; font-weight: 600; color: var(--gw-heading); }
  .user-info .uemail { font-size: 10px; color: var(--gw-muted); }
  .logout-btn {
    margin-top: 8px; width: 100%;
    padding: 8px; background: transparent;
    border: 1px solid var(--gw-border);
    color: var(--gw-body); font-size: 11px;
    cursor: pointer; border-radius: 8px;
    letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.2s;
    font-weight: 500;
  }
  .logout-btn:hover { 
    color: var(--gw-danger); 
    border-color: var(--gw-danger);
    background: rgba(232, 80, 80, 0.05);
  }

  /* ============================================
     MAIN
     ============================================ */
  .main { margin-left: 260px; flex: 1; min-height: 100vh; }
  .topbar {
    height: 64px; padding: 0 32px;
    border-bottom: 1px solid var(--gw-border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--gw-surface);
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 2px 8px var(--gw-shadow);
  }
  .topbar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 500; color: var(--gw-heading);
    letter-spacing: 0.5px;
  }
  .topbar-actions { display: flex; align-items: center; gap: 12px; }
  .topbar-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border: 1px solid var(--gw-border);
    border-radius: 99px;
    font-size: 12px; color: var(--gw-body);
    background: var(--gw-page-bg);
  }
  .topbar-badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gw-success); animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .page { padding: 32px; }

  /* ============================================
     KPI CARDS
     ============================================ */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
  .kpi-card {
    background: var(--gw-surface);
    border: 1px solid var(--gw-border);
    border-radius: 16px; padding: 24px;
    position: relative; overflow: hidden;
    transition: all 0.2s;
    box-shadow: 0 2px 8px var(--gw-shadow);
  }
  .kpi-card:hover { 
    border-color: var(--gw-border-brand);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px var(--gw-shadow);
  }
  .kpi-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--gw-cyan-dark), var(--gw-cyan-light));
    opacity: 0; transition: opacity 0.2s;
  }
  .kpi-card:hover::after { opacity: 1; }
  .kpi-label { 
    font-size: 10px; 
    color: var(--gw-muted); 
    letter-spacing: 2px; 
    text-transform: uppercase; 
    margin-bottom: 12px;
    font-weight: 600;
  }
  .kpi-value {
    font-family: 'DM Sans', sans-serif;
    font-size: 36px; font-weight: 300; color: var(--gw-heading);
    line-height: 1; margin-bottom: 8px;
    font-variant-numeric: tabular-nums lining-nums;
  }
  .kpi-value .unit { font-size: 18px; color: var(--gw-cyan); margin-right: 4px; font-weight: 500; }
  .kpi-change { font-size: 12px; display: flex; align-items: center; gap: 4px; font-weight: 500; }
  .kpi-change.up { color: var(--gw-success); }
  .kpi-change.neutral { color: var(--gw-muted); }
  .kpi-icon {
    position: absolute; right: 20px; top: 20px;
    width: 36px;
    height: 36px;
    opacity: 0.15;
  }
  .kpi-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* ============================================
     SECTION HEADER
     ============================================ */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 500; color: var(--gw-heading);
  }
  .section-title span { color: var(--gw-cyan); }

  /* ============================================
     BUTTONS
     ============================================ */
  .btn {
    padding: 10px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; border-radius: 999px;
    transition: all 0.2s; border: 1px solid;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary {
    background: var(--gw-cyan);
    border-color: var(--gw-cyan);
    color: var(--gw-white);
  }
  .btn-primary:hover { 
    background: var(--gw-cyan-dark); 
    border-color: var(--gw-cyan-dark);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(26, 143, 168, 0.3);
  }
  .btn-ghost {
    background: transparent;
    border-color: var(--gw-border);
    color: var(--gw-body);
  }
  .btn-ghost:hover { 
    border-color: var(--gw-cyan); 
    color: var(--gw-cyan);
    background: var(--gw-cyan-a07);
  }
  .btn-danger {
    background: transparent;
    border-color: rgba(232, 80, 80, 0.3);
    color: var(--gw-danger);
  }
  .btn-sm { padding: 6px 16px; font-size: 10px; }

  /* ============================================
     TABLE
     ============================================ */
  .table-wrap {
    background: var(--gw-surface);
    border: 1px solid var(--gw-border);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 2px 8px var(--gw-shadow);
  }
  .table-toolbar {
    padding: 16px 20px;
    border-bottom: 1px solid var(--gw-border);
    display: flex; align-items: center; gap: 12px;
  }
  .search-input {
    flex: 1; max-width: 320px;
    padding: 10px 16px;
    background: var(--gw-page-bg);
    border: 1px solid var(--gw-border);
    border-radius: 10px;
    color: var(--gw-heading); font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none; transition: all 0.2s;
  }
  .search-input:focus { 
    border-color: var(--gw-cyan); 
    box-shadow: 0 0 0 3px rgba(26, 143, 168, 0.1);
  }
  .search-input::placeholder { color: var(--gw-muted); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--gw-border); }
  th {
    padding: 14px 20px;
    text-align: left;
    font-size: 10px; font-weight: 600;
    color: var(--gw-muted);
    letter-spacing: 2px; text-transform: uppercase;
    background: var(--gw-page-bg);
  }
  td {
    padding: 16px 20px;
    font-size: 13px; color: var(--gw-body);
    border-bottom: 1px solid rgba(203, 216, 220, 0.3);
  }
  tr:hover td { background: var(--gw-cyan-a07); }
  tr:last-child td { border-bottom: none; }

  /* ============================================
     BADGES
     ============================================ */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 12px; border-radius: 99px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    border: 1px solid;
  }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; }
  .badge-gold { background: var(--gw-cyan-a12); border-color: var(--gw-border-brand); color: var(--gw-cyan); }
  .badge-gold .badge-dot { background: var(--gw-cyan); }
  .badge-green { background: rgba(46, 204, 138, 0.1); border-color: rgba(46, 204, 138, 0.3); color: var(--gw-success); }
  .badge-green .badge-dot { background: var(--gw-success); }
  .badge-blue { background: rgba(26, 143, 168, 0.1); border-color: rgba(26, 143, 168, 0.3); color: var(--gw-cyan); }
  .badge-blue .badge-dot { background: var(--gw-cyan); }
  .badge-orange { background: rgba(232, 160, 48, 0.1); border-color: rgba(232, 160, 48, 0.3); color: var(--gw-warning); }
  .badge-orange .badge-dot { background: var(--gw-warning); }
  .badge-red { background: rgba(232, 80, 80, 0.1); border-color: rgba(232, 80, 80, 0.3); color: var(--gw-danger); }
  .badge-red .badge-dot { background: var(--gw-danger); }
  .badge-gray { background: rgba(138, 171, 181, 0.1); border-color: rgba(138, 171, 181, 0.3); color: var(--gw-muted); }
  .badge-gray .badge-dot { background: var(--gw-muted); }

  /* ============================================
     LOADING
     ============================================ */
  .loading-wrap { padding: 60px 20px; text-align: center; }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--gw-border);
    border-top-color: var(--gw-cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: var(--gw-muted); letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }

  /* ============================================
     ERROR
     ============================================ */
  .error-wrap {
    padding: 20px; margin: 16px 0;
    background: rgba(232, 80, 80, 0.08);
    border: 1px solid rgba(232, 80, 80, 0.2);
    border-radius: 10px;
    font-size: 13px; color: var(--gw-danger);
    display: flex; align-items: center; gap: 10px;
  }

  /* ============================================
     EMPTY STATE
     ============================================ */
  .empty-state { padding: 60px 20px; text-align: center; }
  .empty-icon { 
    width: 48px; 
    height: 48px; 
    opacity: 0.2; 
    margin: 0 auto 16px;
  }
  .empty-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .empty-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--gw-muted); margin-bottom: 6px; }
  .empty-sub { font-size: 12px; color: var(--gw-muted); }

  /* ============================================
     GRID CARDS
     ============================================ */
  .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .asset-card {
    background: var(--gw-surface);
    border: 1px solid var(--gw-border);
    border-radius: 16px; padding: 24px;
    cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
    box-shadow: 0 2px 8px var(--gw-shadow);
  }
  .asset-card:hover { 
    border-color: var(--gw-border-brand); 
    transform: translateY(-2px);
    box-shadow: 0 4px 16px var(--gw-shadow);
  }
  .asset-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--gw-cyan-dark), var(--gw-cyan-light));
  }
  .asset-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }

const msalInstance = new msal.PublicClientApplication({

// ============================================================
// GRAPH API HELPER
// ============================================================
async function callGraph(endpoint) {
  try {
    const accounts = msalInstance.getAllAccounts();
    if (!accounts.length) throw new Error("No hay sesión activa");
    const tokenRes = await msalInstance.acquireTokenSilent({
      scopes: CONFIG.scopes,
      account: accounts[0],
    });
    const res = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, {
      headers: { Authorization: `Bearer ${tokenRes.accessToken}` },
    });
    if (!res.ok) throw new Error(`Graph API error: ${res.status}`);
    return await res.json();
  } catch (e) {
    // Intentar login interactivo si el token expiró
    if (e.name === "InteractionRequiredAuthError") {
      await msalInstance.acquireTokenPopup({ scopes: CONFIG.scopes });
    }
    throw e;
  }
}

async function postGraph(endpoint, body) {
  const accounts = msalInstance.getAllAccounts();
  const tokenRes = await msalInstance.acquireTokenSilent({
    scopes: CONFIG.scopes,
    account: accounts[0],
  });
  const res = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, {
    method: "POST",
    headers: {
      Authorization: `Bearer ${tokenRes.accessToken}`,
      "Content-Type": "application/json",
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`Error: ${res.status}`);
  return await res.json();
}

// ============================================================
// USER RESOLUTION - Cache de usuarios del sitio
// ============================================================
const userCache = {};

async function resolveUser(siteId, lookupId) {
  if (!lookupId) return null;
  const key = `${siteId}_${lookupId}`;
  if (userCache[key]) return userCache[key];
  try {
    const res = await callGraph(`/sites/${siteId}/lists/User Information List/items/${lookupId}?$expand=fields`);
    const name = res.fields?.Title || res.fields?.Name || null;
    if (name) userCache[key] = name;
    return name;
  } catch(e) {
    return null;
  }
}

async function resolveUsers(siteId, items, lookupFields) {
  // Recolecta todos los LookupIds únicos
  const ids = new Set();
  items.forEach(item => {
    lookupFields.forEach(f => {
      if (item.fields[f]) ids.add(String(item.fields[f]));
    });
  });
  // Resuelve en paralelo
  await Promise.all([...ids].map(id => resolveUser(siteId, id)));
  return userCache;
}

function fmtMoney(val) {
  if (!val) return "—";
  const n = parseFloat(val);
  if (isNaN(n)) return val;
  if (n >= 1000000) return `$${(n/1000000).toFixed(1)}M`;
  if (n >= 1000) return `$${(n/1000).toFixed(0)}K`;
  return `$${n.toLocaleString()}`;
}

function fmtDate(val) {
  if (!val) return "—";
  try { return new Date(val).toLocaleDateString("es-CO", { year: "numeric", month: "short", day: "numeric" }); }
  catch { return val; }
}

function ProyectosPage({ siteId }) {
  const [items, setItems] = useState([]);

  const [error, setError] = useState(null);
  const [search, setSearch] = useState("");
  const [showModal, setShowModal] = useState(false);
  const [selected, setSelected] = useState(null);
  const [saving, setSaving] = useState(false);
  const [users, setUsers] = useState({});
  const [form, setForm] = useState({ Title:"", EtapaActual:"Etapa 1: Evaluación", MontoTarget:"", MontoLevantado:"", NombredelaLLC:"", FechaLOI:"", FechaCierreEstimado:"", EstadoLLC:"Pendiente", EstadoCuentaBancaria:"Pendiente" });

  useEffect(() => {
    async function load() {
      if (!siteId || siteId === "PENDIENTE_CONFIGURAR") {
        setItems([
          { id:1, fields: { Title:"Brickell Office Tower", EtapaActual:"Funding", MontoTarget:"8500000", MontoLevantado:"6200000", NombredelaLLC:"GW Brickell LLC", ResponsableOperativo:"Sebastián Correa", FechaLOI:"2025-09-15" }},
          { id:2, fields: { Title:"Aventura Retail Plaza", EtapaActual:"Ventas", MontoTarget:"12000000", MontoLevantado:"3400000", NombredelaLLC:"GW Aventura LLC", ResponsableOperativo:"Pedro García", FechaLOI:"2025-10-01" }},
          { id:3, fields: { Title:"Doral Warehouse Complex", EtapaActual:"Due Diligence", MontoTarget:"5500000", MontoLevantado:"5500000", NombredelaLLC:"GW Doral LLC", ResponsableOperativo:"Juan Sebastián", FechaLOI:"2025-08-20" }},
          { id:4, fields: { Title:"Coral Gables Office", EtapaActual:"Post Closing", MontoTarget:"9000000", MontoLevantado:"9000000", NombredelaLLC:"GW Coral LLC", ResponsableOperativo:"Sebastián Correa", FechaLOI:"2025-07-10" }},
        ]);
        setLoading(false); return;
      }
      try {
        const res = await callGraph(`/sites/${siteId}/lists/f74aa5f4-8b1f-4a7a-9177-f322a3627927/items?$expand=fields&$top=100`);
        const data = res.value || [];
        setItems(data);
        // Resolver nombres de usuarios
        await resolveUsers(siteId, data, ["ResponsableOperativoLookupId", "ResponsableFinanzasLookupId"]);
        setUsers({...userCache});
      } catch(e) { setError(e.message); }
      finally { setLoading(false); }
    }
    load();
  }, [siteId]);

  const filtered = items.filter(i => i.fields.Title?.toLowerCase().includes(search.toLowerCase()));

  async function handleSave() {
    setSaving(true);
    try {
      if (siteId && siteId !== "PENDIENTE_CONFIGURAR") {
        await postGraph(`/sites/${siteId}/lists/f74aa5f4-8b1f-4a7a-9177-f322a3627927/items`, { fields: form });
        const res = await callGraph(`/sites/${siteId}/lists/f74aa5f4-8b1f-4a7a-9177-f322a3627927/items?$expand=fields&$top=100`);
        setItems(res.value || []);
      } else {
        setItems(prev => [...prev, { id: Date.now(), fields: { ...form } }]);
      }
      setShowModal(false);
      setForm({ Title:"", EtapaActual:"Etapa 1: Evaluación", MontoTarget:"", MontoLevantado:"", NombredelaLLC:"", FechaLOI:"", FechaCierreEstimado:"", EstadoLLC:"Pendiente", EstadoCuentaBancaria:"Pendiente" });
    } catch(e) { alert("Error al guardar: " + e.message); }
    finally { setSaving(false); }
  }

  if (loading) return <Loading />;

  return (
    <div className="page">
      {error && <ErrorMsg msg={`Demo activo — ${error}`} />}
      <div className="section-header">
        <div className="section-title">Proyectos de <span>Inversión</span></div>
        <button className="btn btn-primary" onClick={() => setShowModal(true)}>+ Nuevo Proyecto</button>
      </div>

      <div className="table-wrap">

        </div>
        <table>
          <thead>
            <tr>
              <th>Nombre del Proyecto</th>
              <th>LLC</th>
              <th>Etapa Actual</th>
              <th>Monto Target</th>
              <th>Monto Levantado</th>
              <th>Fecha LOI</th>
              <th>Fecha Cierre Est.</th>
              <th>Estado LLC</th>
              <th>Responsable Op.</th>
              <th></th>
            </tr>
          </thead>

              <tr><td colSpan="10"><div className="empty-state"><div className="empty-icon"><img src={ASSETS.iconInversion} alt="Sin proyectos" /></div><div className="empty-title">Sin proyectos</div></div></td></tr>
            )}
            {filtered.map(p => (
              <tr key={p.id}>
                <td style={{fontWeight:600, color: 'var(--gw-heading)'}}>{p.fields.Title}</td>
                <td style={{fontSize:12, color:'var(--gw-muted)'}}>{p.fields.NombredelaLLC || "—"}</td>
                <td>{getEtapaBadge(p.fields.EtapaActual)}</td>
                <td>{fmtMoney(p.fields.MontoTarget)}</td>
                <td style={{color:'var(--gw-success)', fontWeight: 500}}>{fmtMoney(p.fields.MontoLevantado)}</td>
                <td style={{fontSize:12, color:'var(--gw-muted)'}}>{fmtDate(p.fields.FechaLOI)}</td>
                <td style={{fontSize:12, color:'var(--gw-muted)'}}>{fmtDate(p.fields.FechaCierreEstimado)}</td>

      {showModal && (
        <div className="modal-overlay" onClick={() => setShowModal(false)}>

              <button className="modal-close" onClick={() => setShowModal(false)}>✕</button>
            </div>
            <div className="modal-body">

                  <label className="form-label">Nombre del Proyecto *</label>

                  <input className="form-input" type="date" value={form.FechaCierreEstimado} onChange={e => setForm({...form, FechaCierreEstimado: e.target.value})} />

                <div className="form-group">
                  <label className="form-label">Estado LLC</label>

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [isAuthenticated, setIsAuthenticated] = useState(false);
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('dashboard');

  // Check auth on mount
  useEffect(() => {
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      setUser({
        name: accounts[0].name,
        username: accounts[0].username,
      });
      setIsAuthenticated(true);
    }
    setLoading(false);
  }, []);

  const handleLogin = async () => {
    setLoading(true);
    try {
      const response = await msalInstance.loginPopup({
        scopes: CONFIG.scopes,
      });
      setUser({
        name: response.account.name,
        username: response.account.username,
      });
      setIsAuthenticated(true);
    } catch (e) {
      console.error("Login error:", e);
      // Demo mode - allow access without login
      setUser({ name: "Demo User", username: "demo@g-wealth.com" });
      setIsAuthenticated(true);
    }
    setLoading(false);
  };

  const handleLogout = () => {
    msalInstance.logout();
    setUser(null);
    setIsAuthenticated(false);
  };

  const getPageTitle = () => {
    const titles = {
      dashboard: 'Dashboard',
      proyectos: 'Proyectos de Inversión',
      activos: 'Activos Inmobiliarios',
      inversionistas: 'Inversionistas',
    };
    return titles[activeTab] || 'Dashboard';
  };

  const renderContent = () => {
    switch(activeTab) {
      case 'dashboard':
        return <Dashboard siteInv={CONFIG.siteInversionistas} siteProy={CONFIG.siteProyectos} />;
      case 'proyectos':
        return <ProyectosPage siteId={CONFIG.siteProyectos} />;
      case 'activos':
        return <ActivosPage siteId={CONFIG.siteProyectos} />;
      case 'inversionistas':
        return <InversionistasPage siteId={CONFIG.siteInversionistas} />;
      default:
        return <Dashboard siteInv={CONFIG.siteInversionistas} sitePro={CONFIG.siteProyectos} />;
    }
  };

  if (loading) {
    return (
      <div style={{minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--gw-page-bg)'}}>
        <div className="loading-wrap">
          <div className="spinner"></div>
          <div className="loading-text">Iniciando...</div>
        </div>
      </div>
    );
  }

  if (!isAuthenticated) {
    return <LoginScreen onLogin={handleLogin} loading={loading} />;
  }

  return (
    <div className="app">
      <Sidebar 
        user={user} 
        activeTab={activeTab} 
        setActiveTab={setActiveTab}
        onLogout={handleLogout}
      />
      <div className="main">
        <Topbar title={getPageTitle()} />
        {renderContent()}
      </div>
    </div>
  );
}

// Render the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
